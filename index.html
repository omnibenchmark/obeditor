<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBEditor — OmniBenchmark Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --surface: #252526;
    --border: #3e3e42;
    --accent: #0078d4;
    --accent-dim: #004f8f;
    --text: #cccccc;
    --text-dim: #858585;
    --error: #f44747;
    --ok: #4ec9b0;
    --header-h: 42px;
    --status-h: 26px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    user-select: none;
  }
  #header .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .5px;
    color: #fff;
  }
  #header .logo span { color: var(--accent); }
  #header .sep { flex: 1; }
  #header .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: #fff;
  }
  #version-select {
    font-family: inherit;
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 6px;
    cursor: pointer;
  }
  #version-select:hover { border-color: var(--accent); }
  #version-select:disabled { opacity: .5; cursor: wait; }
  #version-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  #pyodide-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #pyodide-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background .3s;
  }
  #pyodide-status.ready .dot  { background: var(--ok); }
  #pyodide-status.error .dot  { background: var(--error); }
  #pyodide-status.loading .dot {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  /* ── Pane labels + tabs ── */
  #pane-bar {
    height: 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
  }
  .pane-label {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    border-right: 1px solid var(--border);
  }
  .pane-label .badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 2px;
  }
  #repo-tag {
    display: none;
    align-items: center;
    gap: 4px;
    margin-left: 12px;
  }
  #repo-tag.show { display: inline-flex; }
  #repo-tag a {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--badge-border, var(--border));
    background: var(--badge-bg, var(--bg));
    color: var(--badge-fg, var(--text));
    text-decoration: none;
    transition: filter .15s;
  }
  #repo-tag a:hover { filter: brightness(1.25); }
  #repo-tag .sep { color: var(--text-dim); font-size: 11px; }
  #right-tabs {
    flex: 1;
    display: flex;
    align-items: stretch;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: .5px;
    color: var(--text-dim);
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: color .15s, background .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .tab-btn.active {
    color: #fff;
    border-bottom: 2px solid var(--accent);
    background: rgba(0,120,212,.08);
  }
  #tab-copy, #tab-download {
    align-self: center;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  #tab-copy { margin-left: auto; margin-right: 8px; }
  #tab-download { margin-right: 10px; }
  #tab-copy:hover, #tab-download:hover { border-color: var(--accent); color: var(--text); }

  /* ── Editors container ── */
  #editors {
    display: flex;
    height: calc(100vh - var(--header-h) - 28px - var(--status-h));
  }
  .editor-pane {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }

  /* overlay shown while pyodide loads */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(30,30,30,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    font-size: 13px;
    color: var(--text-dim);
  }
  #loading-overlay .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay.hidden { display: none; }

  /* ── Status bar ── */
  #status-bar {
    height: var(--status-h);
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #fff;
    gap: 8px;
  }
  #status-bar.error  { background: var(--error); }
  #status-bar.ok     { background: #16825d; }
  #status-bar.idle   { background: var(--surface); color: var(--text-dim); border-top: 1px solid var(--border); }
  #status-msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Check pane ── */
  #check-pane {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }
  #check-pane.hidden { display: none; }
  .check-badge {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
  }
  .check-badge.ok    { background: rgba(78,201,176,.12); border-color: var(--ok);    color: var(--ok); }
  .check-badge.error { background: rgba(244,71,71,.10);  border-color: var(--error); color: var(--error); }
  .check-badge .check-icon { font-size: 20px; line-height: 1; }
  .check-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .stats-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 16px;
    min-width: 80px;
    text-align: center;
  }
  .stat-chip .val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-chip .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  #mermaid-container {
    position: relative;
    background: #2a2a2a;
    border: 1px solid var(--border);
    border-radius: 5px;
    min-height: 80px;
    height: 420px;
    overflow: hidden;
    cursor: grab;
  }
  #mermaid-container.panning { cursor: grabbing; }
  #mermaid-container:fullscreen { height: 100%; width: 100%; background: #2a2a2a; }
  #mermaid-viewport {
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
  }
  #mermaid-viewport svg { display: block; max-width: none; height: auto; }
  #mermaid-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    z-index: 2;
  }
  #mermaid-controls button {
    width: 28px;
    height: 28px;
    padding: 0;
    font-size: 16px;
    line-height: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  #mermaid-controls button:hover { background: var(--border); }
  .io-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .io-table th, .io-table td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; vertical-align: top; }
  .io-table th { background: var(--surface); color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; font-size: 10px; }
  .io-table td:first-child { font-weight: 600; color: var(--text); white-space: nowrap; }
  .io-table td:not(:first-child) { color: var(--text-dim); font-family: monospace; }
  .io-table .none { color: var(--border); font-style: italic; font-family: inherit; }

  /* ── Results tab (obviewer) ── */
  #results-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  #results-pane.hidden { display: none; }
  #results-pane .res-head {
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  #results-pane .res-title { font-size: 13px; font-weight: 600; color: var(--text); }
  #results-pane .res-endpoint {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    color: var(--text-dim); background: var(--bg); border: 1px solid var(--border);
    border-radius: 3px; padding: 3px 7px;
  }
  #results-pane .res-badge {
    display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim);
  }
  #results-pane .res-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  #results-pane .res-reload { margin-left: auto; }
  #results-pane .res-filters {
    display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 20px; border-bottom: 1px solid var(--border);
  }
  #results-pane .res-chip {
    font-family: inherit; font-size: 11px; color: var(--text-dim); background: var(--bg);
    border: 1px solid var(--border); border-radius: 999px; padding: 4px 11px; cursor: pointer;
  }
  #results-pane .res-chip:hover { border-color: var(--accent); color: #fff; }
  #results-pane .res-chip.on { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  #results-pane .res-chip .c { opacity: .7; font-variant-numeric: tabular-nums; }
  #results-pane .res-scroll { flex: 1; overflow: auto; }
  #results-pane .res-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #results-pane .res-table th {
    position: sticky; top: 0; background: var(--surface); color: var(--text-dim);
    font-weight: 600; text-transform: uppercase; letter-spacing: .6px; font-size: 10px;
    text-align: left; padding: 8px 20px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  #results-pane .res-table td {
    padding: 6px 20px; border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  #results-pane .res-table tr { cursor: pointer; }
  #results-pane .res-table tbody tr:hover { background: rgba(255,255,255,.03); }
  #results-pane .res-table tr.sel { background: rgba(0,120,212,.14); }
  #results-pane .res-key {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; color: var(--text);
    max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    direction: rtl; text-align: left;
  }
  #results-pane .res-key bdi { direction: ltr; }
  #results-pane .res-type {
    font-family: ui-monospace, monospace; font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 4px; border: 1px solid currentColor; white-space: nowrap;
  }
  #results-pane td.num {
    text-align: right; font-family: ui-monospace, monospace; color: var(--text-dim);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  #results-pane .res-ds { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-dim); }
  #results-pane .res-msg { padding: 28px 22px; color: var(--text-dim); font-size: 12.5px; line-height: 1.7; }
  #results-pane .res-msg h4 { color: var(--text); font-size: 13px; margin: 0 0 8px; }
  #results-pane .res-msg code {
    font-family: ui-monospace, monospace; color: var(--text); background: var(--bg);
    border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px;
  }
  #results-pane .res-msg.err h4 { color: var(--error); }
  #results-pane .res-prev {
    border-top: 1px solid var(--border); max-height: 44%; display: flex; flex-direction: column;
  }
  #results-pane .res-prev-head {
    display: flex; align-items: center; gap: 10px; padding: 9px 20px; border-bottom: 1px solid var(--border);
  }
  #results-pane .res-prev-head .fn {
    font-family: ui-monospace, monospace; font-size: 12px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #results-pane .res-prev-head .meta { font-size: 11px; color: var(--text-dim); margin-left: auto; white-space: nowrap; }
  #results-pane .res-prev-body { overflow: auto; padding: 0; }
  #results-pane .res-prev-body pre {
    margin: 0; padding: 14px 20px; font-family: ui-monospace, monospace; font-size: 11.5px;
    line-height: 1.6; white-space: pre; color: var(--text);
  }
  #results-pane .res-prev-body iframe { width: 100%; border: 0; min-height: 180px; background: #fff; }
  #results-pane .res-prev-body table { border-collapse: collapse; font-family: ui-monospace, monospace; font-size: 11px; }
  #results-pane .res-prev-body th, #results-pane .res-prev-body td { border: 1px solid var(--border); padding: 3px 8px; white-space: nowrap; }
  #results-pane .res-prev-head a, #results-pane .res-head a { color: var(--accent); text-decoration: none; }
  #results-pane .res-prev-head a:hover { text-decoration: underline; }
  #results-pane .res-crumbs { padding: 8px 20px; font-size: 12px; border-bottom: 1px solid var(--border); }
  #results-pane .res-crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  #results-pane .res-crumbs a:hover { text-decoration: underline; }
  #results-pane .res-crumbs .sep { color: var(--text-dim); margin: 0 6px; }
  #results-pane tr.res-folder { cursor: pointer; }
  #results-pane tr.res-folder .res-key bdi { font-weight: 600; color: var(--text); }
  #results-pane .res-ficon { margin-right: 6px; }
  #results-pane .res-prev-props {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); display: flex; flex-direction: column; gap: 6px;
  }
  #results-pane .res-prev-props .row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  #results-pane .res-prev-props .k {
    color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; font-size: 9.5px;
  }
  #results-pane .res-prev-props .v { color: var(--text); margin-right: 10px; }
  #results-pane .res-prev-props code.res-fullkey {
    font-family: ui-monospace, monospace; color: var(--text); word-break: break-all;
    background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);
    flex: 1; min-width: 0;
  }
  #results-pane .res-copykey {
    font-family: inherit; font-size: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); border-radius: 4px; padding: 2px 8px; cursor: pointer;
  }
  #results-pane .res-copykey:hover { border-color: var(--accent); color: #fff; }
  #results-pane .res-chip .sz { opacity: .5; margin-left: 5px; font-variant-numeric: tabular-nums; }
  #results-pane .res-stats {
    display: flex; gap: 18px; flex-wrap: wrap; padding: 8px 20px;
    font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border);
  }
  #results-pane .res-stats b { color: var(--text); font-variant-numeric: tabular-nums; }

  /* ── Header buttons ── */
  .hdr-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  .hdr-btn:hover { border-color: var(--accent); color: #fff; }
  #source-pill {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: none;
  }
  #source-pill code {
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
  }
  #source-pill .clear {
    margin-left: 6px;
    color: var(--text-dim);
    cursor: pointer;
  }
  #source-pill .clear:hover { color: var(--error); }

  /* ── Modal ── */
  #modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #modal-backdrop.show { display: flex; }
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 520px;
    max-width: 92vw;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  #modal h2 {
    font-size: 14px;
    color: #fff;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  #modal .body {
    padding: 16px 18px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }
  #modal .body input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    margin-top: 6px;
  }
  #modal .body input:focus { outline: none; border-color: var(--accent); }
  #modal .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  #modal .err {
    font-size: 12px;
    color: var(--error);
    margin-top: 8px;
    min-height: 16px;
  }
  #modal .footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  #modal .footer button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  #modal .footer button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
  #modal .footer button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  #modal .footer button.primary:hover:not(:disabled) { background: #1a8ae0; }
  #modal .footer button:disabled { opacity: .5; cursor: not-allowed; }
  #modal kbd {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
  }
  .trust-banner {
    background: rgba(244,71,71,.08);
    border: 1px solid var(--error);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 12px;
    margin-bottom: 4px;
  }
  .trust-banner strong { color: var(--error); }
  .trust-banner code { font-family: ui-monospace, monospace; color: var(--text); }

  /* ── Filter pane ── */
  #filter-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  #filter-pane.hidden { display: none; }
  #filter-stepper {
    display: flex;
    gap: 6px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
  }
  .step-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .step-pill.active { color: #fff; border-color: var(--accent); background: var(--accent-dim); }
  .step-pill.done   { color: var(--ok); border-color: var(--ok); }

  <div class="logo">OB<span>Editor</span></div>
  <button id="load-url-btn" class="hdr-btn" title="Load benchmark from a GitHub URL">Load from URL…</button>
  <div id="source-pill">

  <div id="pyodide-status" class="loading">

  <div class="sep"></div>

</div>

<div id="editors">
  <div class="editor-pane" id="yaml-pane">

  <div class="editor-pane" id="snake-pane">

      </div>
      <div class="check-section" id="stats-section" style="display:none">
        <h3>Rule Summary</h3>

<!-- js-yaml (parses releases.yaml catalog) -->
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<!-- Mermaid (diagram rendering) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- Monaco Editor (AMD loader) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
<script>
// ── Sample YAML ──────────────────────────────────────────────────────────────
const SAMPLE_YAML = `\
id: clustering_benchmark
name: "Clustering Benchmark"
description: "A benchmark for single-cell clustering methods"
benchmarker: "A. Researcher <researcher@example.org>"
version: "0.1.0"
software_backend: "conda"

software_environments:
  py_env:
    name: "Python environment"
    conda: "envs/conda.yaml"
  r_env:
    name: "R environment"
    conda: "envs/r.yaml"

stages:
  - id: datasets
    outputs:
      - id: data.matrix
        path: "{dataset}.h5ad"
      - id: data.labels
        path: "{dataset}.labels.csv"
    modules:
      - id: pbmc3k
        name: "PBMC 3k dataset"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/pbmc3k
          commit: abc1234def5

      - id: simulated
        name: "Simulated dataset"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/simulated
          commit: deadbeef01
        parameters:
          - n_cells: ["500", "2000"]
            noise: ["low", "high"]

  - id: methods
    inputs:
      - data.matrix
    outputs:
      - id: clustering.labels
        path: "{dataset}_clusters.csv"
    modules:
      - id: leiden
        name: "Leiden clustering"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/leiden
          commit: 1a2b3c4d5e
        parameters:
          - resolution: ["0.5", "1.0", "2.0"]

      - id: kmeans
        name: "K-means clustering"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/kmeans
          commit: 5e4d3c2b1a
        parameters:
          - k: ["5", "10", "20"]

  - id: metrics
    inputs:
      - clustering.labels
      - data.labels
    outputs:
      - id: metrics.ari
        path: "{dataset}_ari.json"
    resources:
      cores: 2
    modules:
      - id: ari
        name: "Adjusted Rand Index"
        software_environment: r_env
        repository:
          url: https://github.com/omnibenchmark-example/ari
          commit: f0e1d2c3b4
`;

// ── State ────────────────────────────────────────────────────────────────────
let yamlEditor  = null;
let rightEditor = null;          // single editor, two models
let snakeModel  = null;
let runnerModel = null;
let activeTab   = "check";       // "check" | "snakefile" | "runner"
let worker      = null;
let pyodideReady = false;
let debounceTimer = null;
let errorDecorations = null;
let releaseCatalog = null;       // { default, releases: [{version,label,url,hidden}] }
let currentWheelUrl = null;

// ── Filter wizard state ──────────────────────────────────────────────────────
// wizardStages: [{id, modules:[{id, name, params:[{hash, items, cli}] | null}]}]
// wizardPicks:  { stage_id: { mod_id: "all" | "first" | string[] } }
//   - module absent from object  → not picked
//   - "all"                      → keep parameters as-is (default)
//   - "first"                    → keep first combo of first set
//   - string[]                   → keep listed combo hashes
const COMBO_INLINE_LIMIT  = 50;
const COMBO_HARD_LIMIT    = 500;
let wizardStages = [];
let wizardStep   = 0;
let wizardPicks  = {};
let wizardParentHash = null;
let wizardParentUrl  = null;
let wizardLastResult = null;     // { filtered_yaml, blob_json, blob_packed, parent_hash, parent_url }

// ── Source-URL / trust state ─────────────────────────────────────────────────
const DEFAULT_TRUSTED_ORGS = ["omnibenchmark", "omni-scrna"];
let loadedSourceUrl = null;      // raw URL the current YAML was fetched from

// ── Monaco setup ─────────────────────────────────────────────────────────────
require.config({ paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs" } });

require(["vs/editor/editor.main"], () => {
  // Left: YAML editor
  yamlEditor = monaco.editor.create(document.getElementById("yaml-editor"), {
    value: SAMPLE_YAML,
    language: "yaml",
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    wordWrap: "off",
    automaticLayout: true,
    tabSize: 2,
    glyphMargin: true,
  });

  // Right: one editor, two models
  snakeModel  = monaco.editor.createModel("# Waiting for Pyodide…", "python");
  runnerModel = monaco.editor.createModel("# Waiting for Pyodide…", "shell");

  rightEditor = monaco.editor.create(document.getElementById("snake-editor"), {
    model: snakeModel,
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    readOnly: true,
    automaticLayout: true,
    tabSize: 4,
  });

  yamlEditor.onDidChangeModelContent(() => scheduleConvert());

  // Tab switching
  document.querySelectorAll(".tab-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const isCheck   = activeTab === "check";
      const isFilter  = activeTab === "filter";
      const isResults = activeTab === "results";
      const isEditor  = !isCheck && !isFilter && !isResults;
      document.getElementById("check-pane").classList.toggle("hidden", !isCheck);
      document.getElementById("filter-pane").classList.toggle("hidden", !isFilter);
      document.getElementById("results-pane").classList.toggle("hidden", !isResults);
      document.getElementById("snake-editor").style.display = isEditor ? "" : "none";
      document.getElementById("tab-copy").style.display = isEditor ? "" : "none";
      document.getElementById("tab-download").style.display = isEditor ? "" : "none";
      if (isEditor) {
        rightEditor.setModel(activeTab === "snakefile" ? snakeModel : runnerModel);
        rightEditor.layout();
      }
      if (isFilter) renderWizard();
      if (isResults) showResults();
    });
  });

  // ── Results tab (obviewer): browse the benchmark's storage bucket ──────────
  // Read-only counterpart to `ob remote files list`. Lists the bucket's current
  // (latest) state via an anonymous S3 GET; no version manifest is consulted.
  // Storage config comes from the parsed YAML; file classification is path-based
  // in JS because get_output_paths() lives in the execution stack we don't load.
  const RES_TYPES = {
    output:      { label: "output",      color: "#4ec9b0" },
    report:      { label: "report",      color: "#d7a25a" },
    metric:      { label: "metric",      color: "#9a93f0" },
    performance: { label: "performance", color: "#6fb96f" },
    config:      { label: "config",      color: "#858585" },
    software:    { label: "software",    color: "#d07cad" },
    manifest:    { label: "manifest",    color: "#6fa8e0" },
  };
  const resState = { sig: null, loading: false, error: null, records: null,
                     fType: "all", fStage: "all", prefix: "", selKey: null, meta: null };

  function readStorageConfig(yamlText) {
    let doc;
    try { doc = jsyaml.load(yamlText); } catch (_) { return null; }
    if (!doc || typeof doc !== "object") return null;
    const s = doc.storage;
    if (s && typeof s === "object") {
      return { endpoint: s.endpoint, api: s.api || "S3", bucket: s.bucket_name };
    }
    if (typeof s === "string") {
      return { endpoint: s, api: doc.storage_api || "S3", bucket: doc.storage_bucket_name };
    }
    return null;
  }

  // Pull stage ids and dataset names out of the benchmark YAML so the results
  // browser can classify object keys for THIS benchmark, not a hardcoded demo.
  function readBenchmarkMeta(yamlText) {
    let doc;
    try { doc = jsyaml.load(yamlText); } catch (_) { doc = null; }
    const stages = [];
    const datasets = new Set();
    if (doc && Array.isArray(doc.stages)) {
      for (const st of doc.stages) {
        if (st && st.id != null) stages.push(String(st.id));
        
        const isRoot = !st || !st.inputs || (Array.isArray(st.inputs) && st.inputs.length === 0);
        if (isRoot) for (const m of (st && st.modules) || []) {
          if (m && m.id != null) datasets.add(String(m.id));
        }
      }
    }
    return { stages, stageSet: new Set(stages), datasets: [...datasets] };
  }

  // Classify an object key using the stage ids + dataset names from `meta`.
  function classifyKey(key, meta) {
    const segs = key.split("/");
    const fn = segs[segs.length - 1];
    if (key.startsWith("config/"))   return { type: "config",   stage: "config",   dataset: "—", fn };
    if (key.startsWith("software/")) return { type: "software", stage: "software", dataset: "—", fn };
    if (key.startsWith("versions/")) return { type: "manifest", stage: "manifest", dataset: "—", fn };
    // Stage = the deepest path segment that matches a declared stage id.
    const stage = [...segs].reverse().find(s => meta.stageSet.has(s)) || "—";
    // Dataset = a declared dataset name the filename is built from.
    const dataset = meta.datasets.find(d =>
      fn === d || fn.startsWith(d + ".") || fn.startsWith(d + "_") || segs.includes(d)) || "—";
    // Type from filename conventions (best-effort, benchmark-agnostic).
    let type = "output";
    if (fn.endsWith(".html")) type = "report";
    else if (/(^|[._-])perf(ormance)?\.(txt|json|tsv)$/i.test(fn)) type = "performance";
    else if (/metrics?\.(json|txt|tsv|csv)$/i.test(fn)) type = "metric";
    return { type, stage, dataset, fn };
  }

  function bucketBase(cfg) {
    return cfg.endpoint.replace(/\/+$/, "") + "/" + encodeURIComponent(cfg.bucket);
  }
  function objectUrl(cfg, key) {
    return bucketBase(cfg) + "/" + key.split("/").map(encodeURIComponent).join("/");
  }

  async function listBucket(cfg, meta) {
    const base = bucketBase(cfg);
    const nsGet = (root, name) => root.getElementsByTagNameNS("*", name);
    const out = [];
    let token = null, guard = 0;
    do {
      let url = base + "?list-type=2&max-keys=1000";
      if (token) url += "&continuation-token=" + encodeURIComponent(token);
      const res = await fetch(url);
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, "application/xml");
      const errCode = nsGet(xml, "Code")[0];
      if (!res.ok || (errCode && nsGet(xml, "Contents").length === 0)) {
        throw new Error("S3 " + (errCode ? errCode.textContent : res.status));
      }
      for (const c of nsGet(xml, "Contents")) {
        const g = n => (nsGet(c, n)[0] || {}).textContent || "";
        out.push({
          key: g("Key"), size: +g("Size"), modified: g("LastModified"),
          etag: g("ETag").replace(/"/g, ""),
        });
      }
      const trunc = (nsGet(xml, "IsTruncated")[0] || {}).textContent === "true";
      token = trunc ? (nsGet(xml, "NextContinuationToken")[0] || {}).textContent : null;
    } while (token && ++guard < 50);
    return out.map(o => ({ ...o, ...classifyKey(o.key, meta) }));
  }

  function fmtSize(n) {
    if (!n) return "0 B";
    const u = ["B", "KB", "MB", "GB"]; let i = 0, v = n;
    while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
    return (i === 0 ? v : v.toFixed(v < 10 ? 1 : 0)) + " " + u[i];
  }
  function fmtDate(s) { const d = new Date(s); return isNaN(d) ? "" : d.toISOString().slice(0, 16).replace("T", " "); }

  function showResults() {
    const pane = document.getElementById("results-pane");
    const yamlText = yamlEditor.getValue();
    const cfg = readStorageConfig(yamlText);
    const meta = readBenchmarkMeta(yamlText);
    resState.meta = meta;
    if (!cfg || !cfg.endpoint || !cfg.bucket) {
      resState.sig = null; resState.records = null;
      pane.innerHTML = '<div class="res-msg"><h4>No storage bucket declared</h4>' +
        'This benchmark has no <code>storage</code> configuration, so there are no ' +
        'published result files to browse. Add <code>storage</code>, <code>storage_api</code> ' +
        'and <code>storage_bucket_name</code> (or a <code>storage: {endpoint, api, bucket_name}</code> ' +
        'block) and re-open this tab.</div>';
      return;
    }
    const sig = cfg.endpoint + "|" + cfg.bucket + "|" + meta.stages.join(",");
    if (resState.sig === sig && (resState.records || resState.error)) { renderResults(cfg); return; }
    resState.sig = sig; resState.loading = true; resState.error = null;
    resState.records = null; resState.selKey = null; resState.fStage = "all"; resState.prefix = "";
    renderResults(cfg);
    listBucket(cfg, meta).then(recs => {
      if (resState.sig !== sig) return;
      resState.loading = false; resState.records = recs; renderResults(cfg);
    }).catch(err => {
      if (resState.sig !== sig) return;
      resState.loading = false; resState.error = err; renderResults(cfg);
    });
  }

  function renderResults(cfg) {
    const pane = document.getElementById("results-pane");
    const host = cfg.endpoint.replace(/^https?:\/\//, "");
    const head =
      '<div class="res-head"><span class="res-title">' + escapeHtmlR(cfg.bucket) + '</span>' +
      '<span class="res-endpoint">' + escapeHtmlR(host) + '</span>' +
      '<span class="res-badge"><span class="dot"></span>live · latest</span>' +
      '<button class="hdr-btn res-reload" id="res-reload">Reload</button></div>';

    if (resState.loading) {
      pane.innerHTML = head + '<div class="res-msg">Listing <code>' + escapeHtmlR(cfg.bucket) +
        '</code> over anonymous S3…</div>';
      wireReload(cfg); return;
    }
    if (resState.error) {
      pane.innerHTML = head +
        '<div class="res-msg err"><h4>Couldn’t list the bucket from the browser</h4>' +
        '<code>' + escapeHtmlR(String(resState.error.message || resState.error)) + '</code><br><br>' +
        'A browser request to the gateway needs two things this endpoint may not yet provide:' +
        '<br>&bull; <b>CORS</b> headers allowing this origin (<code>Access-Control-Allow-Origin</code>).' +
        '<br>&bull; a <b>TLS certificate</b> whose SAN covers <code>' + escapeHtmlR(host) + '</code>.' +
        '<br><br>The bucket itself is anonymously readable — verify with:<br>' +
        '<code>curl \'' + escapeHtmlR(bucketBase(cfg)) + '?list-type=2\'</code><br>' +
        'or list it from the CLI with <code>ob remote files list</code>.</div>';
      wireReload(cfg); return;
    }

    const recs = resState.records || [];
    const prefix = resState.prefix || "";
    const underPrefix = prefix ? recs.filter(r => r.key.startsWith(prefix)) : recs;
    const passType  = r => resState.fType  === "all" || r.type  === resState.fType;
    const passStage = r => resState.fStage === "all" || r.stage === resState.fStage;
    const sumSize   = arr => arr.reduce((s, r) => s + (r.size || 0), 0);

    // Faceted stats: counts + sizes are computed over the CURRENT folder, and
    // each facet is counted with the OTHER facet's filter applied.
    const byType = {}, byTypeSize = {};
    for (const r of underPrefix) if (passStage(r)) {
      byType[r.type] = (byType[r.type] || 0) + 1;
      byTypeSize[r.type] = (byTypeSize[r.type] || 0) + (r.size || 0);
    }
    const byStage = {}, byStageSize = {};
    for (const r of underPrefix) if (passType(r)) {
      byStage[r.stage] = (byStage[r.stage] || 0) + 1;
      byStageSize[r.stage] = (byStageSize[r.stage] || 0) + (r.size || 0);
    }
    const allTypeRecs  = underPrefix.filter(passStage);
    const allStageRecs = underPrefix.filter(passType);

    // Type filter chips (count + size in the current folder).
    let chips = '<button class="res-chip' + (resState.fType === "all" ? " on" : "") +
      '" data-t="all">all <span class="c">' + allTypeRecs.length + '</span>' +
      '<span class="sz">' + fmtSize(sumSize(allTypeRecs)) + '</span></button>';
    for (const t of Object.keys(RES_TYPES)) {
      if (!byType[t]) continue;
      chips += '<button class="res-chip' + (resState.fType === t ? " on" : "") + '" data-t="' + t +
        '" style="color:' + RES_TYPES[t].color + '">' + RES_TYPES[t].label +
        ' <span class="c">' + byType[t] + '</span>' +
        '<span class="sz">' + fmtSize(byTypeSize[t]) + '</span></button>';
    }
    const typeFilters = '<div class="res-filters res-type-filters">' + chips + '</div>';

    // Stage filter chips — ids/order from the benchmark YAML (count + size).
    const stageOrder = (resState.meta && resState.meta.stages) || [];
    const orderedStages = [
      ...stageOrder.filter(s => byStage[s]),
      ...Object.keys(byStage).filter(s => !stageOrder.includes(s)).sort(),
    ];
    let sChips = '<button class="res-chip' + (resState.fStage === "all" ? " on" : "") +
      '" data-s="all">all stages <span class="c">' + allStageRecs.length + '</span>' +
      '<span class="sz">' + fmtSize(sumSize(allStageRecs)) + '</span></button>';
    for (const s of orderedStages) {
      sChips += '<button class="res-chip' + (resState.fStage === s ? " on" : "") +
        '" data-s="' + escapeAttrR(s) + '">' + escapeHtmlR(s) +
        ' <span class="c">' + byStage[s] + '</span>' +
        '<span class="sz">' + fmtSize(byStageSize[s]) + '</span></button>';
    }
    const stageFilters = orderedStages.length > 1
      ? '<div class="res-filters res-stage-filters">' + sChips + '</div>' : "";
    const filters = typeFilters + stageFilters;

    // ── Finder-style navigation: immediate children of the current prefix among
    //    files passing both active filters. Folders descend; files open preview.
    const matching = underPrefix.filter(r => passType(r) && passStage(r));
    const folders = new Map();               // name → { count, size }
    const files = [];
    for (const r of matching) {
      const rest = r.key.slice(prefix.length);
      const slash = rest.indexOf("/");
      if (slash === -1) { files.push(r); continue; }
      const name = rest.slice(0, slash);
      const f = folders.get(name) || { count: 0, size: 0 };
      f.count++; f.size += r.size || 0; folders.set(name, f);
    }

    // Stats bar for the current folder under the active filters.
    const stats = '<div class="res-stats">' +
      '<span class="res-stat"><b>' + matching.length + '</b> object' + (matching.length === 1 ? '' : 's') +
        ' here (recursive)</span>' +
      '<span class="res-stat"><b>' + fmtSize(sumSize(matching)) + '</b> total</span>' +
      '<span class="res-stat">' + folders.size + ' folder' + (folders.size === 1 ? '' : 's') +
        ' · ' + files.length + ' file' + (files.length === 1 ? '' : 's') + ' at this level</span>' +
      '</div>';

    // Breadcrumb.
    let crumbs = '<a class="res-crumb" data-prefix="">root</a>';
    let acc = "";
    for (const seg of prefix.split("/").filter(Boolean)) {
      acc += seg + "/";
      crumbs += '<span class="sep">/</span><a class="res-crumb" data-prefix="' +
        escapeAttrR(acc) + '">' + escapeHtmlR(seg) + '</a>';
    }
    const breadcrumb = '<div class="res-crumbs">' + crumbs + '</div>';

    // Rows: folders first, then files.
    let rows = "";
    for (const [name, f] of [...folders.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
      rows += '<tr class="res-folder" data-folder="' + escapeAttrR(prefix + name + "/") + '">' +
        '<td class="res-key"><span class="res-ficon">📁</span><bdi>' + escapeHtmlR(name) + '</bdi></td>' +
        '<td class="res-ds">—</td><td></td>' +
        '<td class="num">' + fmtSize(f.size) + '</td>' +
        '<td class="res-ds">' + f.count + ' item' + (f.count === 1 ? '' : 's') + '</td></tr>';
    }
    for (const r of files.sort((a, b) => a.fn.localeCompare(b.fn))) {
      const m = RES_TYPES[r.type] || { color: "var(--text)", label: r.type };
      rows += '<tr data-key="' + escapeAttrR(r.key) + '"' + (r.key === resState.selKey ? ' class="sel"' : "") + '>' +
        '<td class="res-key"><span class="res-ficon">📄</span><bdi>' + escapeHtmlR(r.fn) + '</bdi></td>' +
        '<td class="res-ds">' + r.dataset + '</td>' +
        '<td><span class="res-type" style="color:' + m.color + '">' + m.label + '</span></td>' +
        '<td class="num">' + fmtSize(r.size) + '</td>' +
        '<td class="res-ds">' + fmtDate(r.modified) + '</td></tr>';
    }
    if (!rows) rows = '<tr><td colspan="5" class="res-ds" style="padding:16px 12px">' +
      'Nothing here matches the current filters.</td></tr>';

    const table =
      '<div class="res-scroll"><table class="res-table"><thead><tr>' +
      '<th>Name</th><th>Dataset</th><th>Type</th><th style="text-align:right">Size</th><th>Modified</th>' +
      '</tr></thead><tbody id="res-rows">' + rows + '</tbody></table></div>';
    const prev = '<div class="res-prev" id="res-prev" style="display:none"></div>';

    pane.innerHTML = head + filters + breadcrumb + stats + table + prev;
    wireReload(cfg);
    pane.querySelectorAll(".res-type-filters .res-chip").forEach(c =>
      c.addEventListener("click", () => { resState.fType = c.dataset.t; resState.prefix = ""; renderResults(cfg); }));
    pane.querySelectorAll(".res-stage-filters .res-chip").forEach(c =>
      c.addEventListener("click", () => { resState.fStage = c.dataset.s; resState.prefix = ""; renderResults(cfg); }));
    pane.querySelectorAll(".res-crumb").forEach(a =>
      a.addEventListener("click", () => { resState.prefix = a.dataset.prefix; resState.selKey = null; renderResults(cfg); }));
    pane.querySelectorAll("#res-rows tr.res-folder").forEach(tr =>
      tr.addEventListener("click", () => { resState.prefix = tr.dataset.folder; resState.selKey = null; renderResults(cfg); }));
    pane.querySelectorAll("#res-rows tr[data-key]").forEach(tr =>
      tr.addEventListener("click", () => openResultPreview(cfg, tr.dataset.key)));
    if (resState.selKey) {
      const r = recs.find(x => x.key === resState.selKey);
      if (r) openResultPreview(cfg, r.key, true);
    }
  }

  function wireReload(cfg) {
    const b = document.getElementById("res-reload");
    if (b) b.addEventListener("click", () => {
      resState.sig = null; resState.records = null; resState.error = null; showResults();
    });
  }

  async function openResultPreview(cfg, key, keepScroll) {
    const rec = (resState.records || []).find(r => r.key === key);
    if (!rec) return;
    resState.selKey = key;
    document.querySelectorAll("#res-rows tr").forEach(tr =>
      tr.classList.toggle("sel", tr.dataset.key === key));
    const box = document.getElementById("res-prev");
    if (!box) return;
    box.style.display = "";
    box.onclick = (e) => {
      const b = e.target.closest(".res-copykey");
      if (!b) return;
      navigator.clipboard.writeText(b.dataset.key);
      b.textContent = "copied"; setTimeout(() => { b.textContent = "copy key"; }, 1200);
    };
    const url = objectUrl(cfg, key);
    const headHtml =
      '<div class="res-prev-head"><span class="fn">' + escapeHtmlR(rec.fn) + '</span>' +
      '<a href="' + url + '" target="_blank" rel="noopener">download ↗</a>' +
      '<span class="meta">' + fmtSize(rec.size) + ' · md5 ' + rec.etag.slice(0, 10) + '</span></div>' +
      '<div class="res-prev-props">' +
        '<div class="row"><span class="k">key</span>' +
          '<code class="res-fullkey">' + escapeHtmlR(key) + '</code>' +
          '<button class="res-copykey" data-key="' + escapeAttrR(key) + '">copy key</button></div>' +
        '<div class="row">' +
          '<span class="k">stage</span><span class="v">' + escapeHtmlR(rec.stage) + '</span>' +
          '<span class="k">type</span><span class="v">' + escapeHtmlR(rec.type) + '</span>' +
          '<span class="k">dataset</span><span class="v">' + escapeHtmlR(rec.dataset) + '</span></div>' +
      '</div>';
    if (rec.size === 0) {
      box.innerHTML = headHtml + '<div class="res-msg">Empty object (0 bytes) — a declared output the run produced with no content.</div>';
      return;
    }
    if (rec.size > 262144) {
      box.innerHTML = headHtml + '<div class="res-msg">' + fmtSize(rec.size) +
        ' — too large to preview inline. Use <b>download</b>.</div>';
      return;
    }
    box.innerHTML = headHtml + '<div class="res-prev-body"><div class="res-msg">Fetching…</div></div>';
    const body = box.querySelector(".res-prev-body");
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      if (resState.selKey !== key) return;
      if (rec.type === "report" || rec.fn.endsWith(".html")) {
        const f = document.createElement("iframe");
        f.setAttribute("sandbox", ""); f.srcdoc = text; body.innerHTML = ""; body.appendChild(f);
      } else if ((rec.fn.endsWith(".csv") || rec.fn.endsWith(".tsv")) && text.length < 20000) {
        const sep = rec.fn.endsWith(".tsv") ? "\t" : ",";
        const lines = text.trim().split(/\r?\n/).slice(0, 60).map(l => l.split(sep));
        let h = "<table><thead><tr>" + lines[0].map(c => "<th>" + escapeHtmlR(c) + "</th>").join("") + "</tr></thead><tbody>";
        h += lines.slice(1).map(r => "<tr>" + r.map(c => "<td>" + escapeHtmlR(c) + "</td>").join("") + "</tr>").join("");
        body.innerHTML = h + "</tbody></table>";
      } else {
        body.innerHTML = "<pre>" + escapeHtmlR(text) + "</pre>";
      }
    } catch (err) {
      if (resState.selKey !== key) return;
      body.innerHTML = '<div class="res-msg err">Preview fetch failed (' +
        escapeHtmlR(String(err.message || err)) + '). CORS or the TLS-cert mismatch blocks direct ' +
        'browser reads — use <b>download</b>, which opens the gateway URL directly.</div>';
    }
  }

  function escapeHtmlR(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function escapeAttrR(s) { return escapeHtmlR(s).replace(/"/g, "&quot;"); }

  // Filter footer buttons
  document.getElementById("filter-back").addEventListener("click", () => {
    if (wizardStep > 0) { wizardStep--; renderWizard(); }
  });
  document.getElementById("filter-next").addEventListener("click", () => {
    if (wizardStep < wizardStages.length) {
      // On last stage step, "Generate" triggers filter; otherwise advance.
      if (wizardStep === wizardStages.length - 1) {
        runFilter();
      } else {
        wizardStep++; renderWizard();
      }
    }
  });

  // Copy button
  document.getElementById("tab-copy").addEventListener("click", () => {
    const text = rightEditor.getValue();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("tab-copy");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  });

  // Download button — streams the active editor's content to a file so large
  // Snakefiles (thousands of rules) don't have to go through the clipboard.
  document.getElementById("tab-download").addEventListener("click", () => {
    const text = rightEditor.getValue();
    const filename = activeTab === "snakefile" ? "Snakefile" : "run.sh";
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // Load-from-URL button + source pill clear
  document.getElementById("load-url-btn").addEventListener("click", openLoadUrlModal);
  document.getElementById("source-clear").addEventListener("click", () => setSourceUrl(null));

  loadCatalogAndStart();
  maybeLoadFromUrlParam();
});

// ── URL-parameter auto-load ──────────────────────────────────────────────────
// Visiting `index.html?url=https://github.com/<org>/<repo>/blob/<ref>/benchmark.yaml`
// auto-triggers the trust prompt (or fetches directly if the org is trusted).
function maybeLoadFromUrlParam() {
  const params = new URLSearchParams(location.search);
  const url = params.get("url");
  if (!url) return;
  const parsed = parseGitHubUrl(url);
  if (!parsed) {
    setStatus("error", "?url=… is not a valid GitHub URL");
    return;
  }
  if (isOrgTrusted(parsed.org)) {
    fetchAndLoad(parsed);
  } else {
    showTrustPrompt(parsed);
  }
}

// ── GitHub URL handling + trust ──────────────────────────────────────────────
function parseGitHubUrl(input) {
  let u;
  try { u = new URL(input.trim()); } catch (_) { return null; }
  const parts = u.pathname.split("/").filter(Boolean);
  if (u.hostname === "raw.githubusercontent.com") {
    if (parts.length < 4) return null;
    const [org, repo, ref, ...path] = parts;
    return { org, repo, ref, path: path.join("/"), rawUrl: u.href, displayUrl: u.href };
  }
  if (u.hostname === "github.com") {
    if (parts.length < 5 || parts[2] !== "blob") return null;
    const [org, repo, , ref, ...path] = parts;
    const raw = `https://raw.githubusercontent.com/${org}/${repo}/${ref}/${path.join("/")}`;
    return { org, repo, ref, path: path.join("/"), rawUrl: raw, displayUrl: u.href };
  }
  return null;
}

function getStoredTrustedOrgs() {
  try { return JSON.parse(localStorage.getItem("obeditor.trustedOrgs") || "[]"); }
  catch (_) { return []; }
}
function isOrgTrusted(org) {
  const lc = org.toLowerCase();
  return DEFAULT_TRUSTED_ORGS.some(o => o.toLowerCase() === lc) ||
         getStoredTrustedOrgs().some(o => o.toLowerCase() === lc);
}
function trustOrgPersistent(org) {
  const stored = getStoredTrustedOrgs();
  if (!stored.some(o => o.toLowerCase() === org.toLowerCase())) {
    stored.push(org);
    localStorage.setItem("obeditor.trustedOrgs", JSON.stringify(stored));
  }
}

// ── Modal helpers ────────────────────────────────────────────────────────────
function openModal(html) {
  const m = document.getElementById("modal");
  m.innerHTML = html;
  document.getElementById("modal-backdrop").classList.add("show");
}
function closeModal() {
  document.getElementById("modal-backdrop").classList.remove("show");
  document.getElementById("modal").innerHTML = "";
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("modal-backdrop").classList.contains("show")) closeModal();
});
// Click backdrop (not modal body) to close
document.addEventListener("click", e => {
  if (e.target.id === "modal-backdrop") closeModal();
});

function openLoadUrlModal() {
  openModal(`
    <h2>Load benchmark from GitHub</h2>
    <div class="body">
      <label>Paste a GitHub URL to a <code>benchmark.yaml</code>:</label>
      <input id="modal-url" type="url" autocomplete="off" spellcheck="false"
             placeholder="https://github.com/&lt;org&gt;/&lt;repo&gt;/blob/&lt;ref&gt;/benchmark.yaml" />
      <div class="hint">
        Accepts <code>github.com/&hellip;/blob/&hellip;</code> or <code>raw.githubusercontent.com/&hellip;</code>.
        Trusted by default: <code>omnibenchmark</code>, <code>omni-scrna</code>.
      </div>
      <div class="err" id="modal-err"></div>
    </div>
    <div class="footer">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-load" class="primary">Load</button>
    </div>
  `);
  const input = document.getElementById("modal-url");
  input.focus();
  input.addEventListener("keydown", e => { if (e.key === "Enter") attemptLoad(); });
  document.getElementById("modal-cancel").onclick = closeModal;
  document.getElementById("modal-load").onclick = attemptLoad;
}

function attemptLoad() {
  const errEl = document.getElementById("modal-err");
  errEl.textContent = "";
  const raw = document.getElementById("modal-url").value;
  const parsed = parseGitHubUrl(raw);
  if (!parsed) {
    errEl.textContent = "Not a recognized GitHub URL. Use github.com/.../blob/... or raw.githubusercontent.com/...";
    return;
  }
  if (isOrgTrusted(parsed.org)) {
    fetchAndLoad(parsed);
  } else {
    showTrustPrompt(parsed);
  }
}

function showTrustPrompt(parsed) {
  openModal(`
    <h2>Trust this organization?</h2>
    <div class="body">
      <div class="trust-banner">
        Organization <code>${escapeHtml(parsed.org)}</code> is <strong>not trusted</strong>.
      </div>
      <p>You're about to load a benchmark from:</p>
      <p><code style="font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;">${escapeHtml(parsed.rawUrl)}</code></p>
      <div class="hint">
        Loading replaces the YAML in the editor. Nothing is executed — but check the contents before running anything downstream.
        <strong>Trust always</strong> remembers <code>${escapeHtml(parsed.org)}</code> in this browser.
      </div>
    </div>
    <div class="footer">
      <button id="trust-cancel">Cancel</button>
      <button id="trust-once">Trust once</button>
      <button id="trust-always" class="primary">Trust always</button>
    </div>
  `);
  document.getElementById("trust-cancel").onclick = closeModal;
  document.getElementById("trust-once").onclick   = () => fetchAndLoad(parsed);
  document.getElementById("trust-always").onclick = () => {
    trustOrgPersistent(parsed.org);
    fetchAndLoad(parsed);
  };
}

async function fetchAndLoad(parsed) {
  // Show fetching state in the modal.
  openModal(`
    <h2>Loading…</h2>
    <div class="body">
      <p>Fetching <code style="font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;">${escapeHtml(parsed.rawUrl)}</code></p>
      <div class="err" id="modal-err"></div>
    </div>
    <div class="footer"><button id="fetch-cancel">Cancel</button></div>
  `);
  let aborted = false;
  document.getElementById("fetch-cancel").onclick = () => { aborted = true; closeModal(); };
  try {
    const resp = await fetch(parsed.rawUrl, { cache: "no-cache" });
    if (aborted) return;
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    if (aborted) return;
    yamlEditor.setValue(text);
    setSourceUrl(parsed.rawUrl);
    closeModal();
    setStatus("ok", `Loaded from ${parsed.org}/${parsed.repo}`);
  } catch (e) {
    const errEl = document.getElementById("modal-err");
    if (errEl) errEl.textContent = "Fetch failed: " + e.message;
  }
}

function setSourceUrl(url) {
  loadedSourceUrl = url;
  const pill = document.getElementById("source-pill");
  const tag  = document.getElementById("repo-tag");
  const orgA  = document.getElementById("repo-tag-org");
  const repoA = document.getElementById("repo-tag-repo");
  if (url) {
    document.getElementById("source-url-text").textContent = url;
    pill.style.display = "";
    const parsed = parseGitHubUrl(url);
    if (parsed) {
      applyBadgeColors(orgA,  parsed.org);
      applyBadgeColors(repoA, parsed.org + "/" + parsed.repo);
      orgA.textContent  = parsed.org;
      repoA.textContent = parsed.repo;
      orgA.href  = `https://github.com/${parsed.org}`;
      repoA.href = `https://github.com/${parsed.org}/${parsed.repo}`;
      tag.classList.add("show");
    } else {
      tag.classList.remove("show");
    }
  } else {
    pill.style.display = "none";
    tag.classList.remove("show");
  }
}

// Stable string → hue: same string always picks the same color.
function strHashHue(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
  return h % 360;
}
function applyBadgeColors(el, key) {

  el.style.setProperty("--badge-bg",     `hsla(${hue}, 65%, 50%, 0.32)`);
  el.style.setProperty("--badge-fg",     `hsl(${hue}, 90%, 82%)`);
  el.style.setProperty("--badge-border", `hsla(${hue}, 75%, 60%, 0.85)`);
}

// ── Release catalog ──────────────────────────────────────────────────────────
async function loadCatalogAndStart() {
  const sel = document.getElementById("version-select");
  try {
    const resp = await fetch("releases.yaml", { cache: "no-cache" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    releaseCatalog = jsyaml.load(text);
  } catch (e) {
    setStatus("error", "Could not load releases.yaml: " + e.message);
    setOverlay("Catalog load failed: " + e.message);
    return;
  }

  const visible = (releaseCatalog.releases || []).filter(r => !r.hidden);
  if (!visible.length) {
    setStatus("error", "releases.yaml has no visible entries");
    setOverlay("No releases available");
    return;
  }
  sel.innerHTML = "";
  for (const r of visible) {
    const opt = document.createElement("option");
    opt.value = r.version;
    opt.textContent = r.label || r.version;
    opt.dataset.url = new URL(r.url, location.href).href;
    sel.appendChild(opt);
  }
  const def = releaseCatalog.default;
  if (def && visible.some(r => r.version === def)) sel.value = def;

  sel.addEventListener("change", () => {
    const url = sel.selectedOptions[0]?.dataset.url;
    if (url) startWorker(url);
  });

  startWorker(sel.selectedOptions[0].dataset.url);
}

// ── Worker ───────────────────────────────────────────────────────────────────
function startWorker(wheelUrl) {
  if (worker) {
    try { worker.terminate(); } catch (_) {}
    worker = null;
  }
  pyodideReady = false;
  currentWheelUrl = wheelUrl;
  document.getElementById("version-select").disabled = true;
  setOverlay("Initialising Pyodide…");
  setPyodideStatus("loading", "Starting…");
  // Cache-bust: worker.js evolves with index.html; keep them aligned.
  worker = new Worker("worker.js?v=10");

  worker.onmessage = ({ data }) => {
    switch (data.type) {
      case "status":
        setOverlay(data.message);
        setPyodideStatus("loading", data.message);
        setStatus("idle", data.message);
        break;
      case "ready":
        pyodideReady = true;
        setOverlay(null);
        setPyodideStatus("ready", "Ready");
        setStatus("ok", "Pyodide ready — converting…");
        if (data.version) {
          document.getElementById("ob-version").textContent = "omnibenchmark v" + data.version;
        }
        document.getElementById("version-select").disabled = false;
        scheduleConvert(0);
        break;
      case "result":
        setOverlay(null);
        if (data.ok) {
          snakeModel.setValue(data.snakefile || "");
          runnerModel.setValue(data.runner || "");
          updateWizardData(data.wizard, data.parent_hash, data.parent_url);
          setPyodideStatus("ready", "Ready");
          setStatus("ok", "Snakefile + run.sh updated");
          clearErrorLine();
        } else {
          const errText = data.error || "Unknown error";
          const commented = "# Error\n#\n" +
            errText.split("\n").map(l => "# " + l).join("\n") + "\n";
          snakeModel.setValue(commented);
          runnerModel.setValue(commented);
          setPyodideStatus("error", "Error");
          setStatus("error", errText.split("\n")[0]);
          markErrorLine(data.line);
          updateWizardData(null, null, null);
        }
        document.getElementById("version-select").disabled = false;
        renderCheck(data.ok, data.error, data.stats, data.mermaid, data.io_summary, data.mermaid_links);
        break;
      case "filtered":
        if (data.ok) {
          wizardLastResult = data;
          wizardStep = wizardStages.length;       // result step
          renderWizard();
          setStatus("ok", "Filtered benchmark generated");
        } else {
          document.getElementById("filter-status").textContent = "Error: " + (data.error || "unknown");
          setStatus("error", "Filter failed: " + (data.error || "unknown"));
        }
        break;
    }
  };

  worker.postMessage({ type: "init", wheelUrl });
}

// ── Conversion ───────────────────────────────────────────────────────────────
function scheduleConvert(delay = 600) {
  if (!pyodideReady) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const yaml = yamlEditor.getValue();
    setStatus("idle", "Converting…");
    worker.postMessage({ type: "convert", yaml });
  }, delay);
}

// ── Mermaid pan/zoom ──────────────────────────────────────────────────────────
const _mmView = { scale: 1, x: 0, y: 0 };

function _applyMermaidTransform() {
  const vp = document.getElementById("mermaid-viewport");
  vp.style.transform =
    `translate(${_mmView.x}px, ${_mmView.y}px) scale(${_mmView.scale})`;
}

function resetMermaidView() {
  _mmView.scale = 1; _mmView.x = 0; _mmView.y = 0;
  _applyMermaidTransform();
}

function _zoomMermaid(factor, cx, cy) {
  const next = Math.min(8, Math.max(0.2, _mmView.scale * factor));
  const ratio = next / _mmView.scale;
  // keep the point under (cx, cy) fixed while zooming
  _mmView.x = cx - (cx - _mmView.x) * ratio;
  _mmView.y = cy - (cy - _mmView.y) * ratio;
  _mmView.scale = next;
  _applyMermaidTransform();
}

(function initMermaidPanZoom() {
  const container = document.getElementById("mermaid-container");
  if (!container) return;

  container.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    _zoomMermaid(e.deltaY < 0 ? 1.12 : 1 / 1.12,
                 e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });

  // Pan with a movement threshold so plain clicks still reach node links.
  let down = false, moved = false, startX = 0, startY = 0, lastX = 0, lastY = 0;
  const DRAG_THRESHOLD = 4;

  container.addEventListener("pointerdown", (e) => {
    if (e.target.closest("#mermaid-controls")) return;
    if (e.button !== 0) return;
    down = true; moved = false;
    startX = lastX = e.clientX; startY = lastY = e.clientY;
  });
  window.addEventListener("pointermove", (e) => {
    if (!down) return;
    if (!moved &&
        Math.hypot(e.clientX - startX, e.clientY - startY) > DRAG_THRESHOLD) {
      moved = true;
      container.classList.add("panning");
    }
    if (!moved) return;
    _mmView.x += e.clientX - lastX;
    _mmView.y += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    _applyMermaidTransform();
  });
  window.addEventListener("pointerup", () => {
    down = false;
    container.classList.remove("panning");
  });
  // Suppress the click that follows a drag so it doesn't open a repo link.
  container.addEventListener("click", (e) => {
    if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);

  document.getElementById("mermaid-controls").addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const rect = container.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    if (btn.dataset.zoom === "in")   _zoomMermaid(1.25, cx, cy);
    else if (btn.dataset.zoom === "out") _zoomMermaid(1 / 1.25, cx, cy);
    else if (btn.dataset.zoom === "fullscreen") {
      if (document.fullscreenElement) document.exitFullscreen();
      else container.requestFullscreen();
    }
    else resetMermaidView();
  });
})();

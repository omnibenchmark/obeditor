// ── Filter wizard ────────────────────────────────────────────────────────────
function updateWizardData(wizardJson, parentHash, parentUrl) {
  if (typeof wizardJson === "undefined") {
    console.warn("updateWizardData: worker did not send 'wizard' field — likely a stale worker.js cache. Hard-reload the page (Ctrl+Shift+R).");
  }
  if (!wizardJson) {
    wizardStages = [];
    wizardPicks = {};
    wizardParentHash = null;
    wizardParentUrl = null;
    wizardLastResult = null;
    wizardStep = 0;
    if (activeTab === "filter") renderWizard();
    return;
  }
  const stages = JSON.parse(wizardJson);
  // Reconcile picks: drop entries for stages/modules no longer present.
  // For Custom specs, also drop combo hashes that no longer exist.
  const newPicks = {};
  for (const st of stages) {
    const prev = wizardPicks[st.id];
    if (!prev) continue;
    const stagePicks = {};
    for (const m of st.modules) {
      if (!(m.id in prev)) continue;
      const spec = prev[m.id];
      if (Array.isArray(spec)) {
        const validHashes = new Set((m.params || []).map(p => p.hash));
        const kept = spec.filter(h => validHashes.has(h));
        if (kept.length) stagePicks[m.id] = kept;
        else if (m.params && m.params.length) stagePicks[m.id] = "all";
        else stagePicks[m.id] = "all";
      } else {
        stagePicks[m.id] = spec;
      }
    }
    if (Object.keys(stagePicks).length) newPicks[st.id] = stagePicks;
  }
  wizardStages = stages;
  wizardPicks = newPicks;
  wizardParentHash = parentHash || null;
  wizardParentUrl = parentUrl || null;
  // If user is on a now-out-of-range step, clamp.
  if (wizardStep > wizardStages.length) wizardStep = wizardStages.length;
  // Invalidate stale result if YAML changed.
  if (wizardLastResult && wizardLastResult.parent_hash !== parentHash) {
    wizardLastResult = null;
    if (wizardStep === wizardStages.length) wizardStep = Math.max(0, wizardStages.length - 1);
  }
  if (activeTab === "filter") renderWizard();
}

function renderWizard() {
  const stepperEl = document.getElementById("filter-stepper");
  const bodyEl    = document.getElementById("filter-body");
  const footerEl  = document.getElementById("filter-footer");
  const backBtn   = document.getElementById("filter-back");
  const nextBtn   = document.getElementById("filter-next");
  const statusEl  = document.getElementById("filter-status");

  if (!wizardStages.length) {
    stepperEl.innerHTML = "";
    bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No valid benchmark — fix YAML on the left to use Filter.</div>';
    footerEl.style.display = "none";
    return;
  }

  // Stepper pills
  stepperEl.innerHTML = "";
  wizardStages.forEach((st, i) => {
    const cnt = stagePickCount(st.id);
    const pill = document.createElement("span");
    pill.className = "step-pill" + (i === wizardStep ? " active" : (cnt > 0 ? " done" : ""));
    pill.innerHTML = `${i+1}. ${escapeHtml(st.id)}<span class="count">${cnt}/${st.modules.length}</span>`;
    stepperEl.appendChild(pill);
  });
  const resultPill = document.createElement("span");
  resultPill.className = "step-pill" + (wizardStep === wizardStages.length ? " active" : "");
  resultPill.textContent = `${wizardStages.length+1}. result`;
  stepperEl.appendChild(resultPill);

  if (wizardStep < wizardStages.length) {
    // Stage step
    renderStageStep(wizardStages[wizardStep], bodyEl);
    footerEl.style.display = "";
    backBtn.disabled = wizardStep === 0;
    const ok = stageStepIsValid(wizardStages[wizardStep]);
    nextBtn.disabled = !ok.valid;
    nextBtn.textContent = (wizardStep === wizardStages.length - 1) ? "Generate ✨" : "Next ›";
    statusEl.textContent = ok.valid ? "" : ok.reason;
  } else {
    // Result step
    const r = wizardLastResult;
    if (!r) {
      bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No filter result yet. Go back and click Generate.</div>';
      footerEl.style.display = "";
      backBtn.disabled = false;
      nextBtn.style.display = "none";
      return;
    }
    const stagesKept = Object.keys(wizardPicks).length;
    const totalKept  = Object.values(wizardPicks).reduce((a, s) => a + Object.keys(s).length, 0);
    const totalCombos = totalCombosKept();
    const shortHash = (r.parent_hash || "").slice(0, 12);
    bodyEl.innerHTML = `
      <div class="result-section">
        <h3>Summary</h3>
        <div style="font-size:12px;color:var(--text-dim);">
          ${stagesKept} stage${stagesKept===1?"":"s"} · ${totalKept} module${totalKept===1?"":"s"} ·
          ${totalCombos} param combo${totalCombos===1?"":"s"} ·
          subset-of <code>sha256:${escapeHtml(shortHash)}…</code>
          ${r.parent_url ? '· provenance <code>' + escapeHtml(r.parent_url) + '</code>' : ''}
          ${loadedSourceUrl ? '· derived-from <code>' + escapeHtml(loadedSourceUrl) + '</code>' : ''}
        </div>
      </div>
      <div class="result-section">
        <h3>Filtered benchmark.yaml</h3>
        <pre id="filtered-yaml-out"></pre>
        <div class="result-actions">
          <button id="dl-yaml">Download benchmark.filtered.yaml</button>
          <button id="copy-yaml">Copy</button>
        </div>
      </div>
      <div class="result-section">
        <h3>Selection blob <span style="color:var(--text-dim);font-weight:normal;">(packed for CLI)</span></h3>
        <textarea id="blob-packed-out" readonly rows="3"></textarea>
        <div class="result-actions">
          <button id="copy-blob">Copy</button>
          <button id="dl-blob">Download .obfilter</button>
          <button id="toggle-json">Show JSON</button>
        </div>
        <pre id="blob-json-out" style="display:none;margin-top:6px;"></pre>
      </div>
    `;
    document.getElementById("filtered-yaml-out").textContent = r.filtered_yaml;
    document.getElementById("blob-packed-out").value = r.blob_packed;
    document.getElementById("blob-json-out").textContent = prettyJson(r.blob_json);
    document.getElementById("dl-yaml").onclick   = () => download("benchmark.filtered.yaml", r.filtered_yaml, "text/yaml");
    document.getElementById("copy-yaml").onclick = () => navigator.clipboard.writeText(r.filtered_yaml);
    document.getElementById("copy-blob").onclick = () => navigator.clipboard.writeText(r.blob_packed);
    document.getElementById("dl-blob").onclick   = () => download(`subset-${shortHash}.obfilter`, r.blob_packed, "application/octet-stream");
    document.getElementById("toggle-json").onclick = (e) => {
      const el = document.getElementById("blob-json-out");
      const showing = el.style.display !== "none";
      el.style.display = showing ? "none" : "";
      e.target.textContent = showing ? "Show JSON" : "Hide JSON";
    };
    footerEl.style.display = "";
    backBtn.disabled = false;
    nextBtn.style.display = "none";
    statusEl.textContent = "Generated.";
  }

  // Re-show next button if it was hidden in result view.
  if (wizardStep < wizardStages.length) nextBtn.style.display = "";
}

function runFilter() {
  if (!pyodideReady) return;
  const yaml = yamlEditor.getValue();
  // Picks are already in v2 shape: {stage_id: {mod_id: spec}}.
  document.getElementById("filter-status").textContent = "Generating…";
  worker.postMessage({ type: "filter", yaml, picks: wizardPicks, derivedFrom: loadedSourceUrl });
}

// ── Wizard helpers ───────────────────────────────────────────────────────────
function stagePickCount(sid) {
  const sp = wizardPicks[sid];
  return sp ? Object.keys(sp).length : 0;
}

function combosKeptForModule(stage, mid) {
  // Returns number of param combinations the spec retains for this module.
  const sp = wizardPicks[stage.id]; if (!sp) return 0;
  if (!(mid in sp)) return 0;
  const m = stage.modules.find(x => x.id === mid);
  const total = m && m.params ? m.params.length : 0;
  if (!total) return 1;                  // module without parameters → 1 implicit run
  const spec = sp[mid];
  if (spec === "all") return total;
  if (spec === "first") return 1;
  if (Array.isArray(spec)) return spec.length;
  return 0;
}

function totalCombosKept() {
  let n = 0;
  for (const st of wizardStages) {
    const sp = wizardPicks[st.id]; if (!sp) continue;
    for (const mid of Object.keys(sp)) n += combosKeptForModule(st, mid);
  }
  return n;
}

function stageStepIsValid(stage) {
  const sp = wizardPicks[stage.id];
  if (!sp || Object.keys(sp).length === 0) return { valid: false, reason: "Select ≥1 module to continue." };
  for (const mid of Object.keys(sp)) {
    const spec = sp[mid];
    if (Array.isArray(spec) && spec.length === 0) {
      return { valid: false, reason: `Pick ≥1 combo for ${mid} (or switch to All / First).` };
    }
  }
  return { valid: true };
}

function setSpec(sid, mid, spec) {
  if (!wizardPicks[sid]) wizardPicks[sid] = {};
  wizardPicks[sid][mid] = spec;
}
function unsetSpec(sid, mid) {
  if (!wizardPicks[sid]) return;
  delete wizardPicks[sid][mid];
  if (!Object.keys(wizardPicks[sid]).length) delete wizardPicks[sid];
}

// In-memory per-render UI state for "show all combos" expansion (transient).
const _expandAllCombos = new Set(); // keys: `${sid}:${mid}`

function renderStageStep(stage, bodyEl) {
  bodyEl.innerHTML = `
    <h2>Stage <code>${escapeHtml(stage.id)}</code></h2>
    <div class="stage-hint">
      Pick at least one module. For modules with parameters, choose
      <strong>All</strong>, <strong>First</strong> (single combo, debug),
      or <strong>Custom</strong>.
    </div>
    <div class="selectall">
      <a data-act="all">Select all</a>
      <a data-act="none">Select none</a>
      <span style="margin-left:auto;color:var(--text-dim);">${stagePickCount(stage.id)}/${stage.modules.length} modules</span>
    </div>
    <div id="filter-modules"></div>
  `;
  const modsEl = bodyEl.querySelector("#filter-modules");
  for (const m of stage.modules) modsEl.appendChild(buildModuleRow(stage, m));
  bodyEl.querySelectorAll('.selectall a').forEach(a => {
    a.addEventListener("click", () => {
      if (a.dataset.act === "all") {
        for (const m of stage.modules) {
          if (!wizardPicks[stage.id] || !(m.id in wizardPicks[stage.id])) {
            setSpec(stage.id, m.id, "all");
          }
        }
      } else {
        delete wizardPicks[stage.id];
      }
      renderWizard();
    });
  });
}

function buildModuleRow(stage, m) {
  const sp = wizardPicks[stage.id] || {};
  const isPicked = m.id in sp;
  const spec = sp[m.id];
  const params = m.params || [];
  const hasParams = params.length > 0;
  const tooMany   = params.length > COMBO_HARD_LIMIT;

  const row = document.createElement("div");
  row.className = "module-row";

  // Checkbox
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = isPicked;
  cb.addEventListener("change", () => {
    if (cb.checked) setSpec(stage.id, m.id, "all"); else unsetSpec(stage.id, m.id);
    renderWizard();
  });
  row.appendChild(cb);

  const mid = document.createElement("span");
  mid.className = "mid";
  mid.textContent = m.id;
  row.appendChild(mid);

  if (m.name && m.name !== m.id) {
    const mname = document.createElement("span");
    mname.className = "mname";
    mname.textContent = m.name;
    row.appendChild(mname);
  }

  const spacer = document.createElement("span");
  spacer.className = "row-spacer";
  row.appendChild(spacer);

  if (hasParams) {
    const sel = document.createElement("select");
    sel.className = "param-mode";
    sel.disabled = !isPicked;
    sel.title = "Parameter selection mode";
    const mode = (spec === "first") ? "first" : (Array.isArray(spec) ? "pick" : "all");
    for (const [v, label] of [
      ["all",   `All (${params.length} combo${params.length===1?"":"s"})`],
      ["first", "First (debug)"],
      ["pick",  tooMany ? `Custom… (disabled, >${COMBO_HARD_LIMIT})` : "Custom…"],
    ]) {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = label;
      if (v === "pick" && tooMany) opt.disabled = true;
      if (v === mode) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener("change", () => {
      if (sel.value === "all") setSpec(stage.id, m.id, "all");
      else if (sel.value === "first") setSpec(stage.id, m.id, "first");
      else setSpec(stage.id, m.id, Array.isArray(spec) ? spec : []);
      renderWizard();
    });
    row.appendChild(sel);

    const pcount = document.createElement("span");
    const kept = combosKeptForModule(stage, m.id);
    pcount.className = "pcount" + (isPicked && Array.isArray(spec) && spec.length === 0 ? " warn" : "");
    pcount.textContent = isPicked
      ? `${kept}/${params.length} kept`
      : `${params.length} combos`;
    row.appendChild(pcount);
  }

  const wrapper = document.createDocumentFragment();
  wrapper.appendChild(row);

  if (isPicked && Array.isArray(spec) && hasParams && !tooMany) {
    wrapper.appendChild(buildComboList(stage, m, spec));
  }
  // Wrap into a single element since DocumentFragment doesn't render with margins consistently.
  const div = document.createElement("div");
  div.appendChild(wrapper);
  return div;
}

function buildComboList(stage, m, spec) {
  const params = m.params || [];
  const wrap = document.createElement("div");
  wrap.className = "combo-list";

  const expandKey = `${stage.id}:${m.id}`;
  const expanded = _expandAllCombos.has(expandKey);
  const showLimit = expanded ? params.length : Math.min(COMBO_INLINE_LIMIT, params.length);

  const head = document.createElement("div");
  head.className = "combo-list-head";
  const sel = new Set(spec);
  head.innerHTML = `
    <a data-act="all">All</a>
    <a data-act="none">None</a>
    <span>${sel.size}/${params.length} picked</span>
  `;
  head.querySelector('[data-act=all]').addEventListener("click", () => {
    setSpec(stage.id, m.id, params.map(p => p.hash));
    renderWizard();
  });
  head.querySelector('[data-act=none]').addEventListener("click", () => {
    setSpec(stage.id, m.id, []);
    renderWizard();
  });
  wrap.appendChild(head);

  for (let i = 0; i < showLimit; i++) {
    const p = params[i];
    const row = document.createElement("label");
    row.className = "combo-row";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = sel.has(p.hash);
    cb.addEventListener("change", () => {
      const cur = new Set(Array.isArray(wizardPicks[stage.id]?.[m.id]) ? wizardPicks[stage.id][m.id] : []);
      if (cb.checked) cur.add(p.hash); else cur.delete(p.hash);
      setSpec(stage.id, m.id, [...cur]);
      renderWizard();
    });
    row.appendChild(cb);
    const cli = document.createElement("span");
    cli.className = "ccli";
    cli.textContent = p.cli || JSON.stringify(p.items);
    row.appendChild(cli);
    const hash = document.createElement("span");
    hash.className = "chash";
    hash.textContent = "#" + p.hash;
    row.appendChild(hash);
    wrap.appendChild(row);
  }

  if (params.length > COMBO_INLINE_LIMIT) {
    const more = document.createElement("div");
    if (expanded) {
      more.className = "combo-list-more";
      more.textContent = `Show fewer (collapse to ${COMBO_INLINE_LIMIT})`;
      more.addEventListener("click", () => {
        _expandAllCombos.delete(expandKey);
        renderWizard();
      });
    } else {
      more.className = "combo-list-more";
      more.textContent = `Show all ${params.length} combos (${params.length - COMBO_INLINE_LIMIT} more)`;
      more.addEventListener("click", () => {
        _expandAllCombos.add(expandKey);
        renderWizard();
      });
    }
    wrap.appendChild(more);
  }

  return wrap;
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

function prettyJson(s) {
  try { return JSON.stringify(JSON.parse(s), null, 2); } catch (_) { return s; }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ── Divider drag ─────────────────────────────────────────────────────────────
(function setupDivider() {
  const divider = document.getElementById("divider");
  const editors = document.getElementById("editors");
  const leftPane = document.getElementById("yaml-pane");
  const rightPane = document.getElementById("snake-pane");
  let dragging = false;
  let startX, leftW, totalW;

  divider.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
    leftW = leftPane.getBoundingClientRect().width;
    totalW = editors.getBoundingClientRect().width - divider.offsetWidth;
    divider.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newLeft = Math.max(200, Math.min(totalW - 200, leftW + dx));
    const pct = (newLeft / totalW) * 100;
    leftPane.style.flex = "none";
    leftPane.style.width = pct + "%";
    rightPane.style.flex = "1";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    // trigger Monaco layout
    if (yamlEditor)  yamlEditor.layout();
    if (rightEditor) rightEditor.layout();
  });
})();
</script>

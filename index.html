<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBEditor — OmniBenchmark Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --surface: #252526;
    --border: #3e3e42;
    --accent: #0078d4;
    --accent-dim: #004f8f;
    --text: #cccccc;
    --text-dim: #858585;
    --error: #f44747;
    --ok: #4ec9b0;
    --header-h: 42px;
    --status-h: 26px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    user-select: none;
  }
  #header .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .5px;
    color: #fff;
  }
  #header .logo span { color: var(--accent); }
  #header .sep { flex: 1; }
  #header .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: #fff;
  }
  #version-select {
    font-family: inherit;
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 6px;
    cursor: pointer;
  }
  #version-select:hover { border-color: var(--accent); }
  #version-select:disabled { opacity: .5; cursor: wait; }
  #version-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  #pyodide-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #pyodide-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background .3s;
  }
  #pyodide-status.ready .dot  { background: var(--ok); }
  #pyodide-status.error .dot  { background: var(--error); }
  #pyodide-status.loading .dot {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  /* ── Pane labels + tabs ── */
  #pane-bar {
    height: 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
  }
  .pane-label {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    border-right: 1px solid var(--border);
  }
  .pane-label .badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 2px;
  }
  #right-tabs {
    flex: 1;
    display: flex;
    align-items: stretch;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: .5px;
    color: var(--text-dim);
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: color .15s, background .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .tab-btn.active {
    color: #fff;
    border-bottom: 2px solid var(--accent);
    background: rgba(0,120,212,.08);
  }
  .tab-btn .tab-badge {
    margin-left: 6px;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--border);
    color: var(--text-dim);
  }
  .tab-btn.active .tab-badge { background: var(--accent-dim); color: #fff; }
  #tab-copy {
    margin-left: auto;
    align-self: center;
    margin-right: 10px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  #tab-copy:hover { border-color: var(--accent); color: var(--text); }

  /* ── Editors container ── */
  #editors {
    display: flex;
    height: calc(100vh - var(--header-h) - 28px - var(--status-h));
  }
  .editor-pane {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }

  /* overlay shown while pyodide loads */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(30,30,30,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    font-size: 13px;
    color: var(--text-dim);
  }
  #loading-overlay .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay.hidden { display: none; }

  /* ── Status bar ── */
  #status-bar {
    height: var(--status-h);
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #fff;
    gap: 8px;
  }
  #status-bar.error  { background: var(--error); }
  #status-bar.ok     { background: #16825d; }
  #status-bar.idle   { background: var(--surface); color: var(--text-dim); border-top: 1px solid var(--border); }
  #status-msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Check pane ── */
  #check-pane {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }
  #check-pane.hidden { display: none; }
  .check-badge {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
  }
  .check-badge.ok    { background: rgba(78,201,176,.12); border-color: var(--ok);    color: var(--ok); }
  .check-badge.error { background: rgba(244,71,71,.10);  border-color: var(--error); color: var(--error); }
  .check-badge .check-icon { font-size: 20px; line-height: 1; }
  .check-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .stats-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 16px;
    min-width: 80px;
    text-align: center;
  }
  .stat-chip .val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-chip .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  #mermaid-container {
    background: #2a2a2a;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 16px;
    overflow: auto;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mermaid-container svg { max-width: 100%; height: auto; }

  /* ── Filter pane ── */
  #filter-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  #filter-pane.hidden { display: none; }
  #filter-stepper {
    display: flex;
    gap: 6px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
  }
  .step-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .step-pill.active { color: #fff; border-color: var(--accent); background: var(--accent-dim); }
  .step-pill.done   { color: var(--ok); border-color: var(--ok); }
  .step-pill .count { opacity: .7; margin-left: 4px; font-size: 10px; }
  #filter-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  #filter-body h2 {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
  }
  #filter-body .stage-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .module-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
  }
  .module-row:hover { border-color: var(--accent); }
  .module-row input { cursor: pointer; }
  .module-row .mid { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  .module-row .mname { color: var(--text-dim); font-size: 12px; margin-left: auto; }
  .selectall {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
  }
  .selectall a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .selectall a:hover { text-decoration: underline; }
  #filter-footer {
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
  }
  #filter-footer button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  #filter-footer button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
  #filter-footer button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  #filter-footer button.primary:hover:not(:disabled) { background: #1a8ae0; }
  #filter-footer button:disabled { opacity: .4; cursor: not-allowed; }
  #filter-footer .spacer { flex: 1; }
  #filter-footer .filter-status { font-size: 11px; color: var(--text-dim); }
  .result-section { margin-bottom: 18px; }
  .result-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-section h3 code {
    font-size: 11px;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: none;
    letter-spacing: 0;
  }
  .result-section pre,
  .result-section textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text);
    max-height: 280px;
    overflow: auto;
    white-space: pre;
    resize: vertical;
  }
  .result-section textarea { word-break: break-all; white-space: pre-wrap; }
  .result-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .result-actions button {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  .result-actions button:hover { border-color: var(--accent); color: var(--text); }

  /* ── YAML error glyph ── */
  .error-glyph {
    width: 8px !important;
    height: 8px !important;
    border-radius: 50%;
    background: var(--error);
    margin-top: 5px;
    margin-left: 3px;
  }
  .error-line-bg { background: rgba(244,71,71,.08); }
</style>
</head>
<body>

<div id="header">
  <div class="logo">OB<span>Editor</span></div>
  <div id="pyodide-status" class="loading">
    <div class="dot"></div>
    <span id="pyodide-label">Starting…</span>
  </div>
  <div class="sep"></div>
  <span id="version-label">version</span>
  <select id="version-select" disabled>
    <option>loading…</option>
  </select>
  <div class="tag">OmniBenchmark Playground</div>
</div>

<div id="pane-bar">
  <div class="pane-label">
    benchmark.yaml
    <span class="badge">YAML</span>
  </div>
  <div id="right-tabs">
    <button class="tab-btn active" data-tab="check">
      Check <span class="tab-badge" id="check-tab-badge">—</span>
    </button>
    <button class="tab-btn" data-tab="snakefile">
      Snakefile <span class="tab-badge">preview</span>
    </button>
    <button class="tab-btn" data-tab="runner">
      run.sh <span class="tab-badge">bash</span>
    </button>
    <button class="tab-btn" data-tab="filter">
      Filter <span class="tab-badge">subset</span>
    </button>
    <button id="tab-copy" title="Copy to clipboard" style="display:none">Copy</button>
  </div>
</div>

<div id="editors">
  <div class="editor-pane" id="yaml-pane">
    <div id="yaml-editor" style="width:100%;height:100%;"></div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span id="overlay-msg">Initialising Pyodide…</span>
    </div>
  </div>
  <div id="divider"></div>
  <div class="editor-pane" id="snake-pane">
    <div id="check-pane">
      <div id="check-badge" class="check-badge">
        <span class="check-icon" id="check-icon">···</span>
        <span id="check-msg">Waiting for Pyodide…</span>
      </div>
      <div class="check-section" id="stats-section" style="display:none">
        <h3>Rule Summary</h3>
        <div class="stats-grid" id="stats-grid"></div>
      </div>
      <div class="check-section" id="mermaid-section" style="display:none">
        <h3>Pipeline Topology</h3>
        <div id="mermaid-container"></div>
      </div>
    </div>
    <div id="filter-pane" class="hidden">
      <div id="filter-stepper"></div>
      <div id="filter-body">
        <div id="filter-empty" style="color:var(--text-dim);font-size:12px;">
          Waiting for a valid benchmark…
        </div>
      </div>
      <div id="filter-footer" style="display:none;">
        <button id="filter-back">‹ Back</button>
        <button id="filter-next" class="primary">Next ›</button>
        <div class="spacer"></div>
        <span class="filter-status" id="filter-status"></span>
      </div>
    </div>
    <div id="snake-editor" style="width:100%;height:100%;display:none;"></div>
  </div>
</div>

<div id="status-bar" class="idle">
  <span id="status-msg">Waiting for Pyodide…</span>
  <span id="ob-version" style="margin-left:auto;font-size:11px;opacity:.7;"></span>
</div>

<!-- js-yaml (parses releases.yaml catalog) -->
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<!-- Mermaid (diagram rendering) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- Monaco Editor (AMD loader) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
<script>
// ── Sample YAML ──────────────────────────────────────────────────────────────
const SAMPLE_YAML = `\
id: clustering_benchmark
name: "Clustering Benchmark"
description: "A benchmark for single-cell clustering methods"
benchmarker: "A. Researcher <researcher@example.org>"
version: "0.1.0"
software_backend: "conda"

software_environments:
  py_env:
    name: "Python environment"
    conda: "envs/conda.yaml"
  r_env:
    name: "R environment"
    conda: "envs/r.yaml"

stages:
  - id: datasets
    outputs:
      - id: data.matrix
        path: "{dataset}.h5ad"
      - id: data.labels
        path: "{dataset}.labels.csv"
    modules:
      - id: pbmc3k
        name: "PBMC 3k dataset"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/pbmc3k
          commit: abc1234def5

      - id: simulated
        name: "Simulated dataset"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/simulated
          commit: deadbeef01
        parameters:
          - n_cells: ["500", "2000"]
            noise: ["low", "high"]

  - id: methods
    inputs:
      - data.matrix
    outputs:
      - id: clustering.labels
        path: "{dataset}_clusters.csv"
    modules:
      - id: leiden
        name: "Leiden clustering"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/leiden
          commit: 1a2b3c4d5e
        parameters:
          - resolution: ["0.5", "1.0", "2.0"]

      - id: kmeans
        name: "K-means clustering"
        software_environment: py_env
        repository:
          url: https://github.com/omnibenchmark-example/kmeans
          commit: 5e4d3c2b1a
        parameters:
          - k: ["5", "10", "20"]

  - id: metrics
    inputs:
      - clustering.labels
      - data.labels
    outputs:
      - id: metrics.ari
        path: "{dataset}_ari.json"
    resources:
      cores: 2
    modules:
      - id: ari
        name: "Adjusted Rand Index"
        software_environment: r_env
        repository:
          url: https://github.com/omnibenchmark-example/ari
          commit: f0e1d2c3b4
`;

// ── State ────────────────────────────────────────────────────────────────────
let yamlEditor  = null;
let rightEditor = null;          // single editor, two models
let snakeModel  = null;
let runnerModel = null;
let activeTab   = "check";       // "check" | "snakefile" | "runner"
let worker      = null;
let pyodideReady = false;
let debounceTimer = null;
let errorDecorations = null;
let releaseCatalog = null;       // { default, releases: [{version,label,url,hidden}] }
let currentWheelUrl = null;

// ── Filter wizard state ──────────────────────────────────────────────────────
let wizardStages = [];           // [{id, modules: [{id, name}]}, ...]
let wizardStep   = 0;            // 0..N-1 = stage steps; N = result step
let wizardPicks  = {};           // { stage_id: Set<module_id> }
let wizardParentHash = null;
let wizardParentUrl  = null;
let wizardLastResult = null;     // { filtered_yaml, blob_json, blob_packed, parent_hash, parent_url }

// ── Monaco setup ─────────────────────────────────────────────────────────────
require.config({ paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs" } });

require(["vs/editor/editor.main"], () => {
  // Left: YAML editor
  yamlEditor = monaco.editor.create(document.getElementById("yaml-editor"), {
    value: SAMPLE_YAML,
    language: "yaml",
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    wordWrap: "off",
    automaticLayout: true,
    tabSize: 2,
    glyphMargin: true,
  });

  // Right: one editor, two models
  snakeModel  = monaco.editor.createModel("# Waiting for Pyodide…", "python");
  runnerModel = monaco.editor.createModel("# Waiting for Pyodide…", "shell");

  rightEditor = monaco.editor.create(document.getElementById("snake-editor"), {
    model: snakeModel,
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    readOnly: true,
    automaticLayout: true,
    tabSize: 4,
  });

  yamlEditor.onDidChangeModelContent(() => scheduleConvert());

  // Tab switching
  document.querySelectorAll(".tab-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const isCheck  = activeTab === "check";
      const isFilter = activeTab === "filter";
      const isEditor = !isCheck && !isFilter;
      document.getElementById("check-pane").classList.toggle("hidden", !isCheck);
      document.getElementById("filter-pane").classList.toggle("hidden", !isFilter);
      document.getElementById("snake-editor").style.display = isEditor ? "" : "none";
      document.getElementById("tab-copy").style.display = isEditor ? "" : "none";
      if (isEditor) {
        rightEditor.setModel(activeTab === "snakefile" ? snakeModel : runnerModel);
        rightEditor.layout();
      }
      if (isFilter) renderWizard();
    });
  });

  // Filter footer buttons
  document.getElementById("filter-back").addEventListener("click", () => {
    if (wizardStep > 0) { wizardStep--; renderWizard(); }
  });
  document.getElementById("filter-next").addEventListener("click", () => {
    if (wizardStep < wizardStages.length) {
      // On last stage step, "Generate" triggers filter; otherwise advance.
      if (wizardStep === wizardStages.length - 1) {
        runFilter();
      } else {
        wizardStep++; renderWizard();
      }
    }
  });

  // Copy button
  document.getElementById("tab-copy").addEventListener("click", () => {
    const text = rightEditor.getValue();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("tab-copy");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  });

  loadCatalogAndStart();
});

// ── Release catalog ──────────────────────────────────────────────────────────
async function loadCatalogAndStart() {
  const sel = document.getElementById("version-select");
  try {
    const resp = await fetch("releases.yaml", { cache: "no-cache" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    releaseCatalog = jsyaml.load(text);
  } catch (e) {
    setStatus("error", "Could not load releases.yaml: " + e.message);
    setOverlay("Catalog load failed: " + e.message);
    return;
  }

  const visible = (releaseCatalog.releases || []).filter(r => !r.hidden);
  if (!visible.length) {
    setStatus("error", "releases.yaml has no visible entries");
    setOverlay("No releases available");
    return;
  }
  sel.innerHTML = "";
  for (const r of visible) {
    const opt = document.createElement("option");
    opt.value = r.version;
    opt.textContent = r.label || r.version;
    opt.dataset.url = new URL(r.url, location.href).href;
    sel.appendChild(opt);
  }
  const def = releaseCatalog.default;
  if (def && visible.some(r => r.version === def)) sel.value = def;

  sel.addEventListener("change", () => {
    const url = sel.selectedOptions[0]?.dataset.url;
    if (url) startWorker(url);
  });

  startWorker(sel.selectedOptions[0].dataset.url);
}

// ── Worker ───────────────────────────────────────────────────────────────────
function startWorker(wheelUrl) {
  if (worker) {
    try { worker.terminate(); } catch (_) {}
    worker = null;
  }
  pyodideReady = false;
  currentWheelUrl = wheelUrl;
  document.getElementById("version-select").disabled = true;
  setOverlay("Initialising Pyodide…");
  setPyodideStatus("loading", "Starting…");
  // Cache-bust: worker.js evolves with index.html; keep them aligned.
  worker = new Worker("worker.js?v=3");

  worker.onmessage = ({ data }) => {
    switch (data.type) {
      case "status":
        setOverlay(data.message);
        setPyodideStatus("loading", data.message);
        setStatus("idle", data.message);
        break;
      case "ready":
        pyodideReady = true;
        setOverlay(null);
        setPyodideStatus("ready", "Ready");
        setStatus("ok", "Pyodide ready — converting…");
        if (data.version) {
          document.getElementById("ob-version").textContent = "omnibenchmark v" + data.version;
        }
        document.getElementById("version-select").disabled = false;
        scheduleConvert(0);
        break;
      case "result":
        setOverlay(null);
        if (data.ok) {
          snakeModel.setValue(data.snakefile || "");
          runnerModel.setValue(data.runner || "");
          updateWizardData(data.wizard, data.parent_hash, data.parent_url);
          setPyodideStatus("ready", "Ready");
          setStatus("ok", "Snakefile + run.sh updated");
          clearErrorLine();
        } else {
          const errText = data.error || "Unknown error";
          const commented = "# Error\n#\n" +
            errText.split("\n").map(l => "# " + l).join("\n") + "\n";
          snakeModel.setValue(commented);
          runnerModel.setValue(commented);
          setPyodideStatus("error", "Error");
          setStatus("error", errText.split("\n")[0]);
          markErrorLine(data.line);
          updateWizardData(null, null, null);
        }
        document.getElementById("version-select").disabled = false;
        renderCheck(data.ok, data.error, data.stats, data.mermaid);
        break;
      case "filtered":
        if (data.ok) {
          wizardLastResult = data;
          wizardStep = wizardStages.length;       // result step
          renderWizard();
          setStatus("ok", "Filtered benchmark generated");
        } else {
          document.getElementById("filter-status").textContent = "Error: " + (data.error || "unknown");
          setStatus("error", "Filter failed: " + (data.error || "unknown"));
        }
        break;
    }
  };

  worker.postMessage({ type: "init", wheelUrl });
}

// ── Conversion ───────────────────────────────────────────────────────────────
function scheduleConvert(delay = 600) {
  if (!pyodideReady) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const yaml = yamlEditor.getValue();
    setStatus("idle", "Converting…");
    worker.postMessage({ type: "convert", yaml });
  }, delay);
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function setOverlay(msg) {
  const el = document.getElementById("loading-overlay");
  if (msg === null) {
    el.classList.add("hidden");
  } else {
    el.classList.remove("hidden");
    document.getElementById("overlay-msg").textContent = msg;
  }
}

function setPyodideStatus(state, label) {
  const el = document.getElementById("pyodide-status");
  el.className = state;
  document.getElementById("pyodide-label").textContent = label;
}

function markErrorLine(lineNumber) {
  clearErrorLine();
  if (!lineNumber || !yamlEditor) return;
  errorDecorations = yamlEditor.createDecorationsCollection([{
    range: new monaco.Range(lineNumber, 1, lineNumber, 1),
    options: {
      glyphMarginClassName: "error-glyph",
      isWholeLine: true,
      className: "error-line-bg",
    },
  }]);
}

function clearErrorLine() {
  if (errorDecorations) { errorDecorations.clear(); errorDecorations = null; }
}

function setStatus(cls, msg) {
  const bar = document.getElementById("status-bar");
  bar.className = cls;
  document.getElementById("status-msg").textContent = msg;
}

// ── Mermaid setup ────────────────────────────────────────────────────────────
mermaid.initialize({ startOnLoad: false, theme: "dark" });
let _mermaidCounter = 0;

async function renderMermaid(source) {
  const container = document.getElementById("mermaid-container");
  container.innerHTML = "";
  try {
    const id = "mermaid-" + (++_mermaidCounter);
    const { svg } = await mermaid.render(id, source);
    container.innerHTML = svg;
  } catch (e) {
    container.textContent = "Diagram error: " + e.message;
  }
}

function renderStats(statsJson) {
  if (!statsJson) return;
  const stats = JSON.parse(statsJson);
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = "";
  const addChip = (val, lbl) => {
    const chip = document.createElement("div");
    chip.className = "stat-chip";
    chip.innerHTML = `<div class="val">${val}</div><div class="lbl">${lbl}</div>`;
    grid.appendChild(chip);
  };
  addChip(stats.stages, "stages");
  addChip(stats.total, "total rules");
  for (const [sid, cnt] of Object.entries(stats.by_stage || {})) {
    addChip(cnt, sid);
  }
  document.getElementById("stats-section").style.display = "";
}

function renderCheck(ok, errMsg, statsJson, mermaidSrc) {
  const badge = document.getElementById("check-badge");
  const icon  = document.getElementById("check-icon");
  const msg   = document.getElementById("check-msg");
  const tabBadge = document.getElementById("check-tab-badge");
  if (ok) {
    badge.className = "check-badge ok";
    icon.textContent  = "✓";
    msg.textContent   = "Validation passed";
    tabBadge.textContent = "OK";
    tabBadge.style.background = "rgba(78,201,176,.3)";
    tabBadge.style.color = "var(--ok)";
  } else {
    badge.className = "check-badge error";
    icon.textContent  = "✗";
    msg.textContent   = (errMsg || "Validation failed").split("\n")[0];
    tabBadge.textContent = "ERR";
    tabBadge.style.background = "rgba(244,71,71,.3)";
    tabBadge.style.color = "var(--error)";
  }
  if (ok && statsJson) renderStats(statsJson);
  if (ok && mermaidSrc) {
    document.getElementById("mermaid-section").style.display = "";
    renderMermaid(mermaidSrc);
  }
}

// ── Filter wizard ────────────────────────────────────────────────────────────
function updateWizardData(wizardJson, parentHash, parentUrl) {
  if (typeof wizardJson === "undefined") {
    console.warn("updateWizardData: worker did not send 'wizard' field — likely a stale worker.js cache. Hard-reload the page (Ctrl+Shift+R).");
  }
  if (!wizardJson) {
    wizardStages = [];
    wizardPicks = {};
    wizardParentHash = null;
    wizardParentUrl = null;
    wizardLastResult = null;
    wizardStep = 0;
    if (activeTab === "filter") renderWizard();
    return;
  }
  const stages = JSON.parse(wizardJson);
  // Reconcile picks: drop entries for stages/modules no longer present.
  const newPicks = {};
  for (const st of stages) {
    const ids = new Set(st.modules.map(m => m.id));
    const prev = wizardPicks[st.id];
    if (prev) {
      const kept = new Set([...prev].filter(id => ids.has(id)));
      if (kept.size) newPicks[st.id] = kept;
    }
  }
  wizardStages = stages;
  wizardPicks = newPicks;
  wizardParentHash = parentHash || null;
  wizardParentUrl = parentUrl || null;
  // If user is on a now-out-of-range step, clamp.
  if (wizardStep > wizardStages.length) wizardStep = wizardStages.length;
  // Invalidate stale result if YAML changed.
  if (wizardLastResult && wizardLastResult.parent_hash !== parentHash) {
    wizardLastResult = null;
    if (wizardStep === wizardStages.length) wizardStep = Math.max(0, wizardStages.length - 1);
  }
  if (activeTab === "filter") renderWizard();
}

function renderWizard() {
  const stepperEl = document.getElementById("filter-stepper");
  const bodyEl    = document.getElementById("filter-body");
  const footerEl  = document.getElementById("filter-footer");
  const backBtn   = document.getElementById("filter-back");
  const nextBtn   = document.getElementById("filter-next");
  const statusEl  = document.getElementById("filter-status");

  if (!wizardStages.length) {
    stepperEl.innerHTML = "";
    bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No valid benchmark — fix YAML on the left to use Filter.</div>';
    footerEl.style.display = "none";
    return;
  }

  // Stepper pills
  stepperEl.innerHTML = "";
  wizardStages.forEach((st, i) => {
    const cnt = (wizardPicks[st.id]?.size) || 0;
    const pill = document.createElement("span");
    pill.className = "step-pill" + (i === wizardStep ? " active" : (cnt > 0 ? " done" : ""));
    pill.innerHTML = `${i+1}. ${escapeHtml(st.id)}<span class="count">${cnt}/${st.modules.length}</span>`;
    stepperEl.appendChild(pill);
  });
  const resultPill = document.createElement("span");
  resultPill.className = "step-pill" + (wizardStep === wizardStages.length ? " active" : "");
  resultPill.textContent = `${wizardStages.length+1}. result`;
  stepperEl.appendChild(resultPill);

  if (wizardStep < wizardStages.length) {
    // Stage step
    const st = wizardStages[wizardStep];
    const picked = wizardPicks[st.id] || new Set();
    const rows = st.modules.map(m => {
      const checked = picked.has(m.id) ? "checked" : "";
      return `<label class="module-row">
        <input type="checkbox" data-mid="${escapeAttr(m.id)}" ${checked}>
        <span class="mid">${escapeHtml(m.id)}</span>
        <span class="mname">${escapeHtml(m.name && m.name !== m.id ? m.name : "")}</span>
      </label>`;
    }).join("");
    bodyEl.innerHTML = `
      <h2>Stage <code>${escapeHtml(st.id)}</code></h2>
      <div class="stage-hint">Pick at least one module to keep. Unchecked modules are pruned in the output.</div>
      <div class="selectall">
        <a data-act="all">Select all</a>
        <a data-act="none">Select none</a>
      </div>
      <div id="filter-modules">${rows}</div>
    `;
    bodyEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener("change", () => {
        const set = wizardPicks[st.id] || new Set();
        if (cb.checked) set.add(cb.dataset.mid); else set.delete(cb.dataset.mid);
        if (set.size) wizardPicks[st.id] = set; else delete wizardPicks[st.id];
        // Re-render stepper counts only.
        renderWizard();
      });
    });
    bodyEl.querySelectorAll('.selectall a').forEach(a => {
      a.addEventListener("click", () => {
        if (a.dataset.act === "all") {
          wizardPicks[st.id] = new Set(st.modules.map(m => m.id));
        } else {
          delete wizardPicks[st.id];
        }
        renderWizard();
      });
    });
    footerEl.style.display = "";
    backBtn.disabled = wizardStep === 0;
    const haveAtLeastOne = (wizardPicks[st.id]?.size || 0) > 0;
    nextBtn.disabled = !haveAtLeastOne;
    nextBtn.textContent = (wizardStep === wizardStages.length - 1) ? "Generate ✨" : "Next ›";
    statusEl.textContent = haveAtLeastOne ? "" : "Select ≥1 module to continue.";
  } else {
    // Result step
    const r = wizardLastResult;
    if (!r) {
      bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No filter result yet. Go back and click Generate.</div>';
      footerEl.style.display = "";
      backBtn.disabled = false;
      nextBtn.style.display = "none";
      return;
    }
    const totalKept = Object.values(wizardPicks).reduce((a, s) => a + s.size, 0);
    const stagesKept = Object.keys(wizardPicks).length;
    const shortHash = (r.parent_hash || "").slice(0, 12);
    bodyEl.innerHTML = `
      <div class="result-section">
        <h3>Summary</h3>
        <div style="font-size:12px;color:var(--text-dim);">
          ${stagesKept} stage${stagesKept===1?"":"s"} · ${totalKept} module${totalKept===1?"":"s"} kept ·
          subset-of <code>sha256:${escapeHtml(shortHash)}…</code>
          ${r.parent_url ? '· canonical-url <code>' + escapeHtml(r.parent_url) + '</code>' : ''}
        </div>
      </div>
      <div class="result-section">
        <h3>Filtered benchmark.yaml</h3>
        <pre id="filtered-yaml-out"></pre>
        <div class="result-actions">
          <button id="dl-yaml">Download benchmark.filtered.yaml</button>
          <button id="copy-yaml">Copy</button>
        </div>
      </div>
      <div class="result-section">
        <h3>Selection blob <span style="color:var(--text-dim);font-weight:normal;">(packed for CLI)</span></h3>
        <textarea id="blob-packed-out" readonly rows="3"></textarea>
        <div class="result-actions">
          <button id="copy-blob">Copy</button>
          <button id="dl-blob">Download .obfilter</button>
          <button id="toggle-json">Show JSON</button>
        </div>
        <pre id="blob-json-out" style="display:none;margin-top:6px;"></pre>
      </div>
    `;
    document.getElementById("filtered-yaml-out").textContent = r.filtered_yaml;
    document.getElementById("blob-packed-out").value = r.blob_packed;
    document.getElementById("blob-json-out").textContent = prettyJson(r.blob_json);
    document.getElementById("dl-yaml").onclick   = () => download("benchmark.filtered.yaml", r.filtered_yaml, "text/yaml");
    document.getElementById("copy-yaml").onclick = () => navigator.clipboard.writeText(r.filtered_yaml);
    document.getElementById("copy-blob").onclick = () => navigator.clipboard.writeText(r.blob_packed);
    document.getElementById("dl-blob").onclick   = () => download(`subset-${shortHash}.obfilter`, r.blob_packed, "application/octet-stream");
    document.getElementById("toggle-json").onclick = (e) => {
      const el = document.getElementById("blob-json-out");
      const showing = el.style.display !== "none";
      el.style.display = showing ? "none" : "";
      e.target.textContent = showing ? "Show JSON" : "Hide JSON";
    };
    footerEl.style.display = "";
    backBtn.disabled = false;
    nextBtn.style.display = "none";
    statusEl.textContent = "Generated.";
  }

  // Re-show next button if it was hidden in result view.
  if (wizardStep < wizardStages.length) nextBtn.style.display = "";
}

function runFilter() {
  if (!pyodideReady) return;
  const yaml = yamlEditor.getValue();
  const picks = {};
  for (const [sid, set] of Object.entries(wizardPicks)) {
    picks[sid] = [...set];
  }
  document.getElementById("filter-status").textContent = "Generating…";
  worker.postMessage({ type: "filter", yaml, picks });
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

function prettyJson(s) {
  try { return JSON.stringify(JSON.parse(s), null, 2); } catch (_) { return s; }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ── Divider drag ─────────────────────────────────────────────────────────────
(function setupDivider() {
  const divider = document.getElementById("divider");
  const editors = document.getElementById("editors");
  const leftPane = document.getElementById("yaml-pane");
  const rightPane = document.getElementById("snake-pane");
  let dragging = false;
  let startX, leftW, totalW;

  divider.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
    leftW = leftPane.getBoundingClientRect().width;
    totalW = editors.getBoundingClientRect().width - divider.offsetWidth;
    divider.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newLeft = Math.max(200, Math.min(totalW - 200, leftW + dx));
    const pct = (newLeft / totalW) * 100;
    leftPane.style.flex = "none";
    leftPane.style.width = pct + "%";
    rightPane.style.flex = "1";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    // trigger Monaco layout
    if (yamlEditor)  yamlEditor.layout();
    if (rightEditor) rightEditor.layout();
  });
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBEditor — OmniBenchmark Playground</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e1e;
    --surface: #252526;
    --border: #3e3e42;
    --accent: #0078d4;
    --accent-dim: #004f8f;
    --text: #cccccc;
    --text-dim: #858585;
    --error: #f44747;
    --ok: #4ec9b0;
    --header-h: 42px;
    --status-h: 26px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    user-select: none;
  }
  #header .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .5px;
    color: #fff;
  }
  #header .logo span { color: var(--accent); }
  #header .sep { flex: 1; }
  #header .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: #fff;
  }
  #version-select {
    font-family: inherit;
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 6px;
    cursor: pointer;
  }
  #version-select:hover { border-color: var(--accent); }
  #version-select:disabled { opacity: .5; cursor: wait; }
  #version-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  #pyodide-status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #pyodide-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background .3s;
  }
  #pyodide-status.ready .dot  { background: var(--ok); }
  #pyodide-status.error .dot  { background: var(--error); }
  #pyodide-status.loading .dot {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  /* ── Pane labels + tabs ── */
  #pane-bar {
    height: 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
  }
  .pane-label {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    border-right: 1px solid var(--border);
  }
  .pane-label .badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 2px;
  }
  #repo-tag {
    display: none;
    align-items: center;
    gap: 4px;
    margin-left: 12px;
  }
  #repo-tag.show { display: inline-flex; }
  #repo-tag a {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--badge-border, var(--border));
    background: var(--badge-bg, var(--bg));
    color: var(--badge-fg, var(--text));
    text-decoration: none;
    transition: filter .15s;
  }
  #repo-tag a:hover { filter: brightness(1.25); }
  #repo-tag .sep { color: var(--text-dim); font-size: 11px; }
  #right-tabs {
    flex: 1;
    display: flex;
    align-items: stretch;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: .5px;
    color: var(--text-dim);
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: color .15s, background .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .tab-btn.active {
    color: #fff;
    border-bottom: 2px solid var(--accent);
    background: rgba(0,120,212,.08);
  }
  #tab-copy {
    margin-left: auto;
    align-self: center;
    margin-right: 10px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  #tab-copy:hover { border-color: var(--accent); color: var(--text); }

  /* ── Editors container ── */
  #editors {
    display: flex;
    height: calc(100vh - var(--header-h) - 28px - var(--status-h));
  }
  .editor-pane {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .15s;
  }
  #divider:hover, #divider.dragging { background: var(--accent); }

  /* overlay shown while pyodide loads */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(30,30,30,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    font-size: 13px;
    color: var(--text-dim);
  }
  #loading-overlay .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay.hidden { display: none; }

  /* ── Status bar ── */
  #status-bar {
    height: var(--status-h);
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 12px;
    color: #fff;
    gap: 8px;
  }
  #status-bar.error  { background: var(--error); }
  #status-bar.ok     { background: #16825d; }
  #status-bar.idle   { background: var(--surface); color: var(--text-dim); border-top: 1px solid var(--border); }
  #status-msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Check pane ── */
  #check-pane {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }
  #check-pane.hidden { display: none; }
  .check-badge {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
  }
  .check-badge.ok    { background: rgba(78,201,176,.12); border-color: var(--ok);    color: var(--ok); }
  .check-badge.error { background: rgba(244,71,71,.10);  border-color: var(--error); color: var(--error); }
  .check-badge .check-icon { font-size: 20px; line-height: 1; }
  .check-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .stats-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 16px;
    min-width: 80px;
    text-align: center;
  }
  .stat-chip .val { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .stat-chip .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  #mermaid-container {
    position: relative;
    background: #2a2a2a;
    border: 1px solid var(--border);
    border-radius: 5px;
    min-height: 80px;
    height: 420px;
    overflow: hidden;
    cursor: grab;
  }
  #mermaid-container.panning { cursor: grabbing; }
  #mermaid-container:fullscreen { height: 100%; width: 100%; background: #2a2a2a; }
  #mermaid-viewport {
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
  }
  #mermaid-viewport svg { display: block; max-width: none; height: auto; }
  #mermaid-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    z-index: 2;
  }
  #mermaid-controls button {
    width: 28px;
    height: 28px;
    padding: 0;
    font-size: 16px;
    line-height: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  #mermaid-controls button:hover { background: var(--border); }
  .io-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .io-table th, .io-table td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; vertical-align: top; }
  .io-table th { background: var(--surface); color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; font-size: 10px; }
  .io-table td:first-child { font-weight: 600; color: var(--text); white-space: nowrap; }
  .io-table td:not(:first-child) { color: var(--text-dim); font-family: monospace; }
  .io-table .none { color: var(--border); font-style: italic; font-family: inherit; }

  /* ── Header buttons ── */
  .hdr-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  .hdr-btn:hover { border-color: var(--accent); color: #fff; }
  #source-pill {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: none;
  }
  #source-pill code {
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
  }
  #source-pill .clear {
    margin-left: 6px;
    color: var(--text-dim);
    cursor: pointer;
  }
  #source-pill .clear:hover { color: var(--error); }

  /* ── Modal ── */
  #modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #modal-backdrop.show { display: flex; }
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 520px;
    max-width: 92vw;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  #modal h2 {
    font-size: 14px;
    color: #fff;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  #modal .body {
    padding: 16px 18px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }
  #modal .body input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    margin-top: 6px;
  }
  #modal .body input:focus { outline: none; border-color: var(--accent); }
  #modal .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  #modal .err {
    font-size: 12px;
    color: var(--error);
    margin-top: 8px;
    min-height: 16px;
  }
  #modal .footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  #modal .footer button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  #modal .footer button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
  #modal .footer button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  #modal .footer button.primary:hover:not(:disabled) { background: #1a8ae0; }
  #modal .footer button:disabled { opacity: .5; cursor: not-allowed; }
  #modal kbd {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
  }
  .trust-banner {
    background: rgba(244,71,71,.08);
    border: 1px solid var(--error);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 12px;
    margin-bottom: 4px;
  }
  .trust-banner strong { color: var(--error); }
  .trust-banner code { font-family: ui-monospace, monospace; color: var(--text); }

  /* ── Filter pane ── */
  #filter-pane {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }
  #filter-pane.hidden { display: none; }
  #filter-stepper {
    display: flex;
    gap: 6px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
  }
  .step-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .step-pill.active { color: #fff; border-color: var(--accent); background: var(--accent-dim); }
  .step-pill.done   { color: var(--ok); border-color: var(--ok); }
  .step-pill .count { opacity: .7; margin-left: 4px; font-size: 10px; }
  #filter-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  #filter-body h2 {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
  }
  #filter-body .stage-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  .module-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
  }
  .module-row:hover { border-color: var(--accent); }
  .module-row input { cursor: pointer; }
  .module-row .mid { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text); }
  .module-row .mname { color: var(--text-dim); font-size: 12px; margin-left: 4px; }
  .module-row .row-spacer { flex: 1; }
  .module-row .param-mode {
    font-family: inherit;
    font-size: 11px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    margin-left: 8px;
  }
  .module-row .param-mode:hover:not(:disabled) { border-color: var(--accent); }
  .module-row .param-mode:disabled { opacity: .5; }
  .module-row .pcount {
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 1px 7px;
    margin-left: 6px;
  }
  .module-row .pcount.warn { color: var(--error); border-color: var(--error); }
  .combo-list {
    margin: 4px 0 8px 28px;
    padding: 8px 12px;
    border-left: 2px solid var(--border);
    background: rgba(255,255,255,.02);
    border-radius: 0 4px 4px 0;
  }
  .combo-list-head {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .combo-list-head a { color: var(--accent); cursor: pointer; }
  .combo-list-head a:hover { text-decoration: underline; }
  .combo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 3px 4px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 3px;
  }
  .combo-row:hover { background: rgba(255,255,255,.04); }
  .combo-row .ccli {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .combo-row .chash {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--text-dim);
    font-size: 10px;
  }
  .combo-list-more {
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    margin-top: 4px;
  }
  .combo-list-more:hover { text-decoration: underline; }
  .combo-list-warn {
    font-size: 11px;
    color: var(--error);
    margin-top: 4px;
  }
  .selectall {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
  }
  .selectall a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .selectall a:hover { text-decoration: underline; }
  #filter-footer {
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
  }
  #filter-footer button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  #filter-footer button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
  #filter-footer button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  #filter-footer button.primary:hover:not(:disabled) { background: #1a8ae0; }
  #filter-footer button:disabled { opacity: .4; cursor: not-allowed; }
  #filter-footer .spacer { flex: 1; }
  #filter-footer .filter-status { font-size: 11px; color: var(--text-dim); }
  .result-section { margin-bottom: 18px; }
  .result-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-section h3 code {
    font-size: 11px;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: none;
    letter-spacing: 0;
  }
  .result-section pre,
  .result-section textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    color: var(--text);
    max-height: 280px;
    overflow: auto;
    white-space: pre;
    resize: vertical;
  }
  .result-section textarea { word-break: break-all; white-space: pre-wrap; }
  .result-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .result-actions button {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
  }
  .result-actions button:hover { border-color: var(--accent); color: var(--text); }

  /* ── YAML error glyph ── */
  .error-glyph {
    width: 8px !important;
    height: 8px !important;
    border-radius: 50%;
    background: var(--error);
    margin-top: 5px;
    margin-left: 3px;
  }
  .error-line-bg { background: rgba(244,71,71,.08); }
</style>
</head>
<body>

<div id="header">
  <div class="logo">OB<span>Editor</span></div>
  <button id="load-url-btn" class="hdr-btn" title="Load benchmark from a GitHub URL">Load from URL…</button>
  <div id="source-pill">
    from <code id="source-url-text"></code>
    <span class="clear" id="source-clear" title="Forget source URL">✕</span>
  </div>
  <div id="pyodide-status" class="loading">
    <div class="dot"></div>
    <span id="pyodide-label">Starting…</span>
  </div>
  <div class="sep"></div>
  <span id="version-label">version</span>
  <select id="version-select" disabled>
    <option>loading…</option>
  </select>
</div>

<div id="pane-bar">
  <div class="pane-label">
    benchmark.yaml
    <span class="badge">YAML</span>
    <span id="repo-tag" title="Source repository on GitHub">
      <a id="repo-tag-org" target="_blank" rel="noopener"></a>
      <span class="sep">/</span>
      <a id="repo-tag-repo" target="_blank" rel="noopener"></a>
    </span>
  </div>
  <div id="right-tabs">
    <button class="tab-btn active" data-tab="check">
      Check
    </button>
    <button class="tab-btn" data-tab="snakefile">
      Snakefile
    </button>
    <button class="tab-btn" data-tab="runner">

<script>
// ── Sample YAML ──────────────────────────────────────────────────────────────
const SAMPLE_YAML = `\

        repository:

// ── State ────────────────────────────────────────────────────────────────────
let yamlEditor  = null;
let rightEditor = null;          // single editor, two models
let snakeModel  = null;
let runnerModel = null;
let activeTab   = "check";       // "check" | "snakefile" | "runner"
let worker      = null;
let pyodideReady = false;
let debounceTimer = null;
let errorDecorations = null;
let releaseCatalog = null;       // { default, releases: [{version,label,url,hidden}] }
let currentWheelUrl = null;

// ── Filter wizard state ──────────────────────────────────────────────────────
// wizardStages: [{id, modules:[{id, name, params:[{hash, items, cli}] | null}]}]
// wizardPicks:  { stage_id: { mod_id: "all" | "first" | string[] } }
//   - module absent from object  → not picked
//   - "all"                      → keep parameters as-is (default)
//   - "first"                    → keep first combo of first set
//   - string[]                   → keep listed combo hashes
const COMBO_INLINE_LIMIT  = 50;
const COMBO_HARD_LIMIT    = 500;
let wizardStages = [];
let wizardStep   = 0;
let wizardPicks  = {};
let wizardParentHash = null;
let wizardParentUrl  = null;
let wizardLastResult = null;     // { filtered_yaml, blob_json, blob_packed, parent_hash, parent_url }

// ── Source-URL / trust state ─────────────────────────────────────────────────
const DEFAULT_TRUSTED_ORGS = ["omnibenchmark", "omni-scrna"];
let loadedSourceUrl = null;      // raw URL the current YAML was fetched from

// ── Monaco setup ─────────────────────────────────────────────────────────────
require.config({ paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs" } });

require(["vs/editor/editor.main"], () => {
  // Left: YAML editor
  yamlEditor = monaco.editor.create(document.getElementById("yaml-editor"), {
    value: SAMPLE_YAML,
    language: "yaml",
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    wordWrap: "off",
    automaticLayout: true,
    tabSize: 2,
    glyphMargin: true,
  });

  // Right: one editor, two models
  snakeModel  = monaco.editor.createModel("# Waiting for Pyodide…", "python");
  runnerModel = monaco.editor.createModel("# Waiting for Pyodide…", "shell");

  rightEditor = monaco.editor.create(document.getElementById("snake-editor"), {
    model: snakeModel,
    theme: "vs-dark",
    fontSize: 13,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    lineNumbers: "on",
    readOnly: true,
    automaticLayout: true,
    tabSize: 4,
  });

  yamlEditor.onDidChangeModelContent(() => scheduleConvert());

  // Tab switching
  document.querySelectorAll(".tab-btn[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const isCheck  = activeTab === "check";
      const isFilter = activeTab === "filter";
      const isEditor = !isCheck && !isFilter;
      document.getElementById("check-pane").classList.toggle("hidden", !isCheck);
      document.getElementById("filter-pane").classList.toggle("hidden", !isFilter);
      document.getElementById("snake-editor").style.display = isEditor ? "" : "none";
      document.getElementById("tab-copy").style.display = isEditor ? "" : "none";
      if (isEditor) {
        rightEditor.setModel(activeTab === "snakefile" ? snakeModel : runnerModel);
        rightEditor.layout();
      }
      if (isFilter) renderWizard();
    });
  });

  // Filter footer buttons
  document.getElementById("filter-back").addEventListener("click", () => {
    if (wizardStep > 0) { wizardStep--; renderWizard(); }
  });
  document.getElementById("filter-next").addEventListener("click", () => {
    if (wizardStep < wizardStages.length) {
      // On last stage step, "Generate" triggers filter; otherwise advance.
      if (wizardStep === wizardStages.length - 1) {
        runFilter();
      } else {
        wizardStep++; renderWizard();
      }
    }
  });

  // Copy button
  document.getElementById("tab-copy").addEventListener("click", () => {
    const text = rightEditor.getValue();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("tab-copy");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  });

  // Load-from-URL button + source pill clear
  document.getElementById("load-url-btn").addEventListener("click", openLoadUrlModal);
  document.getElementById("source-clear").addEventListener("click", () => setSourceUrl(null));

  loadCatalogAndStart();
  maybeLoadFromUrlParam();
});

// ── URL-parameter auto-load ──────────────────────────────────────────────────
// Visiting `index.html?url=https://github.com/<org>/<repo>/blob/<ref>/benchmark.yaml`
// auto-triggers the trust prompt (or fetches directly if the org is trusted).
function maybeLoadFromUrlParam() {
  const params = new URLSearchParams(location.search);
  const url = params.get("url");
  if (!url) return;
  const parsed = parseGitHubUrl(url);
  if (!parsed) {
    setStatus("error", "?url=… is not a valid GitHub URL");
    return;
  }
  if (isOrgTrusted(parsed.org)) {
    fetchAndLoad(parsed);
  } else {
    showTrustPrompt(parsed);
  }
}

// ── GitHub URL handling + trust ──────────────────────────────────────────────
function parseGitHubUrl(input) {
  let u;
  try { u = new URL(input.trim()); } catch (_) { return null; }
  const parts = u.pathname.split("/").filter(Boolean);
  if (u.hostname === "raw.githubusercontent.com") {
    if (parts.length < 4) return null;
    const [org, repo, ref, ...path] = parts;
    return { org, repo, ref, path: path.join("/"), rawUrl: u.href, displayUrl: u.href };
  }
  if (u.hostname === "github.com") {
    if (parts.length < 5 || parts[2] !== "blob") return null;
    const [org, repo, , ref, ...path] = parts;
    const raw = `https://raw.githubusercontent.com/${org}/${repo}/${ref}/${path.join("/")}`;
    return { org, repo, ref, path: path.join("/"), rawUrl: raw, displayUrl: u.href };
  }
  return null;
}

function getStoredTrustedOrgs() {
  try { return JSON.parse(localStorage.getItem("obeditor.trustedOrgs") || "[]"); }
  catch (_) { return []; }
}
function isOrgTrusted(org) {
  const lc = org.toLowerCase();
  return DEFAULT_TRUSTED_ORGS.some(o => o.toLowerCase() === lc) ||
         getStoredTrustedOrgs().some(o => o.toLowerCase() === lc);
}
function trustOrgPersistent(org) {
  const stored = getStoredTrustedOrgs();
  if (!stored.some(o => o.toLowerCase() === org.toLowerCase())) {
    stored.push(org);
    localStorage.setItem("obeditor.trustedOrgs", JSON.stringify(stored));
  }
}

// ── Modal helpers ────────────────────────────────────────────────────────────
function openModal(html) {
  const m = document.getElementById("modal");
  m.innerHTML = html;
  document.getElementById("modal-backdrop").classList.add("show");
}
function closeModal() {
  document.getElementById("modal-backdrop").classList.remove("show");
  document.getElementById("modal").innerHTML = "";
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("modal-backdrop").classList.contains("show")) closeModal();
});
// Click backdrop (not modal body) to close
document.addEventListener("click", e => {
  if (e.target.id === "modal-backdrop") closeModal();
});

function openLoadUrlModal() {
  openModal(`
    <h2>Load benchmark from GitHub</h2>
    <div class="body">
      <label>Paste a GitHub URL to a <code>benchmark.yaml</code>:</label>
      <input id="modal-url" type="url" autocomplete="off" spellcheck="false"
             placeholder="https://github.com/&lt;org&gt;/&lt;repo&gt;/blob/&lt;ref&gt;/benchmark.yaml" />
      <div class="hint">
        Accepts <code>github.com/&hellip;/blob/&hellip;</code> or <code>raw.githubusercontent.com/&hellip;</code>.
        Trusted by default: <code>omnibenchmark</code>, <code>omni-scrna</code>.
      </div>
      <div class="err" id="modal-err"></div>
    </div>
    <div class="footer">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-load" class="primary">Load</button>
    </div>
  `);
  const input = document.getElementById("modal-url");
  input.focus();
  input.addEventListener("keydown", e => { if (e.key === "Enter") attemptLoad(); });
  document.getElementById("modal-cancel").onclick = closeModal;
  document.getElementById("modal-load").onclick = attemptLoad;
}

function attemptLoad() {
  const errEl = document.getElementById("modal-err");
  errEl.textContent = "";
  const raw = document.getElementById("modal-url").value;
  const parsed = parseGitHubUrl(raw);
  if (!parsed) {
    errEl.textContent = "Not a recognized GitHub URL. Use github.com/.../blob/... or raw.githubusercontent.com/...";
    return;
  }
  if (isOrgTrusted(parsed.org)) {
    fetchAndLoad(parsed);
  } else {
    showTrustPrompt(parsed);
  }
}

function showTrustPrompt(parsed) {
  openModal(`
    <h2>Trust this organization?</h2>
    <div class="body">
      <div class="trust-banner">
        Organization <code>${escapeHtml(parsed.org)}</code> is <strong>not trusted</strong>.
      </div>
      <p>You're about to load a benchmark from:</p>
      <p><code style="font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;">${escapeHtml(parsed.rawUrl)}</code></p>
      <div class="hint">
        Loading replaces the YAML in the editor. Nothing is executed — but check the contents before running anything downstream.
        <strong>Trust always</strong> remembers <code>${escapeHtml(parsed.org)}</code> in this browser.
      </div>
    </div>
    <div class="footer">
      <button id="trust-cancel">Cancel</button>
      <button id="trust-once">Trust once</button>
      <button id="trust-always" class="primary">Trust always</button>
    </div>
  `);
  document.getElementById("trust-cancel").onclick = closeModal;
  document.getElementById("trust-once").onclick   = () => fetchAndLoad(parsed);
  document.getElementById("trust-always").onclick = () => {
    trustOrgPersistent(parsed.org);
    fetchAndLoad(parsed);
  };
}

async function fetchAndLoad(parsed) {
  // Show fetching state in the modal.
  openModal(`
    <h2>Loading…</h2>
    <div class="body">
      <p>Fetching <code style="font-family:ui-monospace,monospace;font-size:12px;word-break:break-all;">${escapeHtml(parsed.rawUrl)}</code></p>
      <div class="err" id="modal-err"></div>
    </div>
    <div class="footer"><button id="fetch-cancel">Cancel</button></div>
  `);
  let aborted = false;
  document.getElementById("fetch-cancel").onclick = () => { aborted = true; closeModal(); };
  try {
    const resp = await fetch(parsed.rawUrl, { cache: "no-cache" });
    if (aborted) return;
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();
    if (aborted) return;
    yamlEditor.setValue(text);
    setSourceUrl(parsed.rawUrl);
    closeModal();
    setStatus("ok", `Loaded from ${parsed.org}/${parsed.repo}`);
  } catch (e) {
    const errEl = document.getElementById("modal-err");
    if (errEl) errEl.textContent = "Fetch failed: " + e.message;
  }
}

function setSourceUrl(url) {
  loadedSourceUrl = url;
  const pill = document.getElementById("source-pill");
  const tag  = document.getElementById("repo-tag");
  const orgA  = document.getElementById("repo-tag-org");
  const repoA = document.getElementById("repo-tag-repo");
  if (url) {
    document.getElementById("source-url-text").textContent = url;
    pill.style.display = "";
    const parsed = parseGitHubUrl(url);
    if (parsed) {
      applyBadgeColors(orgA,  parsed.org);
      applyBadgeColors(repoA, parsed.org + "/" + parsed.repo);
      orgA.textContent  = parsed.org;
      repoA.textContent = parsed.repo;
      orgA.href  = `https://github.com/${parsed.org}`;
      repoA.href = `https://github.com/${parsed.org}/${parsed.repo}`;
      tag.classList.add("show");
    } else {
      tag.classList.remove("show");
    }
  } else {
    pill.style.display = "none";
    tag.classList.remove("show");
  }
}

// Stable string → hue: same string always picks the same color.
function strHashHue(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
  return h % 360;
}
function applyBadgeColors(el, key) {
  const hue = strHashHue(key);
  el.style.setProperty("--badge-bg",     `hsla(${hue}, 65%, 50%, 0.32)`);
  el.style.setProperty("--badge-fg",     `hsl(${hue}, 90%, 82%)`);
  el.style.setProperty("--badge-border", `hsla(${hue}, 75%, 60%, 0.85)`);
}

// ── Release catalog ──────────────────────────────────────────────────────────
async function loadCatalogAndStart() {
  const sel = document.getElementById("version-select");
  try {
    const resp = await fetch("releases.yaml", { cache: "no-cache" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    releaseCatalog = jsyaml.load(text);
  } catch (e) {
    setStatus("error", "Could not load releases.yaml: " + e.message);
    setOverlay("Catalog load failed: " + e.message);
    return;
  }

  const visible = (releaseCatalog.releases || []).filter(r => !r.hidden);
  if (!visible.length) {
    setStatus("error", "releases.yaml has no visible entries");
    setOverlay("No releases available");
    return;
  }
  sel.innerHTML = "";
  for (const r of visible) {
    const opt = document.createElement("option");
    opt.value = r.version;
    opt.textContent = r.label || r.version;
    opt.dataset.url = new URL(r.url, location.href).href;
    sel.appendChild(opt);
  }
  const def = releaseCatalog.default;
  if (def && visible.some(r => r.version === def)) sel.value = def;

  sel.addEventListener("change", () => {
    const url = sel.selectedOptions[0]?.dataset.url;
    if (url) startWorker(url);
  });

  startWorker(sel.selectedOptions[0].dataset.url);
}

// ── Worker ───────────────────────────────────────────────────────────────────
function startWorker(wheelUrl) {
  if (worker) {
    try { worker.terminate(); } catch (_) {}
    worker = null;
  }
  pyodideReady = false;
  currentWheelUrl = wheelUrl;
  document.getElementById("version-select").disabled = true;
  setOverlay("Initialising Pyodide…");
  setPyodideStatus("loading", "Starting…");
  // Cache-bust: worker.js evolves with index.html; keep them aligned.
  worker = new Worker("worker.js?v=8");

  worker.onmessage = ({ data }) => {
    switch (data.type) {
      case "status":
        setOverlay(data.message);
        setPyodideStatus("loading", data.message);
        setStatus("idle", data.message);
        break;
      case "ready":
        pyodideReady = true;
        setOverlay(null);
        setPyodideStatus("ready", "Ready");
        setStatus("ok", "Pyodide ready — converting…");
        if (data.version) {
          document.getElementById("ob-version").textContent = "omnibenchmark v" + data.version;
        }
        document.getElementById("version-select").disabled = false;
        scheduleConvert(0);
        break;
      case "result":
        setOverlay(null);
        if (data.ok) {
          snakeModel.setValue(data.snakefile || "");
          runnerModel.setValue(data.runner || "");
          updateWizardData(data.wizard, data.parent_hash, data.parent_url);
          setPyodideStatus("ready", "Ready");
          setStatus("ok", "Snakefile + run.sh updated");
          clearErrorLine();
        } else {
          const errText = data.error || "Unknown error";
          const commented = "# Error\n#\n" +
            errText.split("\n").map(l => "# " + l).join("\n") + "\n";
          snakeModel.setValue(commented);
          runnerModel.setValue(commented);
          setPyodideStatus("error", "Error");
          setStatus("error", errText.split("\n")[0]);
          markErrorLine(data.line);
          updateWizardData(null, null, null);
        }
        document.getElementById("version-select").disabled = false;
        renderCheck(data.ok, data.error, data.stats, data.mermaid, data.io_summary, data.mermaid_links);
        break;
      case "filtered":
        if (data.ok) {
          wizardLastResult = data;
          wizardStep = wizardStages.length;       // result step
          renderWizard();
          setStatus("ok", "Filtered benchmark generated");
        } else {
          document.getElementById("filter-status").textContent = "Error: " + (data.error || "unknown");
          setStatus("error", "Filter failed: " + (data.error || "unknown"));
        }
        break;
    }
  };

  worker.postMessage({ type: "init", wheelUrl });
}

// ── Conversion ───────────────────────────────────────────────────────────────
function scheduleConvert(delay = 600) {
  if (!pyodideReady) return;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const yaml = yamlEditor.getValue();
    setStatus("idle", "Converting…");
    worker.postMessage({ type: "convert", yaml });
  }, delay);
}

// ── UI helpers ───────────────────────────────────────────────────────────────
function setOverlay(msg) {
  const el = document.getElementById("loading-overlay");
  if (msg === null) {
    el.classList.add("hidden");
  } else {
    el.classList.remove("hidden");
    document.getElementById("overlay-msg").textContent = msg;
  }
}

function setPyodideStatus(state, label) {
  const el = document.getElementById("pyodide-status");
  el.className = state;
  document.getElementById("pyodide-label").textContent = label;
}

function markErrorLine(lineNumber) {
  clearErrorLine();
  if (!lineNumber || !yamlEditor) return;
  errorDecorations = yamlEditor.createDecorationsCollection([{
    range: new monaco.Range(lineNumber, 1, lineNumber, 1),
    options: {
      glyphMarginClassName: "error-glyph",
      isWholeLine: true,
      className: "error-line-bg",
    },
  }]);
}

function clearErrorLine() {
  if (errorDecorations) { errorDecorations.clear(); errorDecorations = null; }
}

function setStatus(cls, msg) {
  const bar = document.getElementById("status-bar");
  bar.className = cls;
  document.getElementById("status-msg").textContent = msg;
}

// ── Mermaid setup ────────────────────────────────────────────────────────────
mermaid.initialize({ startOnLoad: false, theme: "dark", securityLevel: "loose" });
let _mermaidCounter = 0;
let _mermaidLinks = {};

// Called by mermaid `click` directives. Resolves the node id to a repo URL and
// opens it. URLs come from the benchmark YAML, so only allow http(s).
window.obModuleClick = function (nid) {
  const url = _mermaidLinks[nid];
  if (url && /^https?:\/\//i.test(url)) window.open(url, "_blank", "noopener");
};

async function renderMermaid(source) {
  const viewport = document.getElementById("mermaid-viewport");
  viewport.innerHTML = "";
  try {
    const id = "mermaid-" + (++_mermaidCounter);
    const { svg, bindFunctions } = await mermaid.render(id, source);
    viewport.innerHTML = svg;
    if (bindFunctions) bindFunctions(viewport);
    resetMermaidView();
  } catch (e) {
    viewport.textContent = "Diagram error: " + e.message;
  }
}

// ── Mermaid pan/zoom ──────────────────────────────────────────────────────────
const _mmView = { scale: 1, x: 0, y: 0 };

function _applyMermaidTransform() {
  const vp = document.getElementById("mermaid-viewport");
  vp.style.transform =
    `translate(${_mmView.x}px, ${_mmView.y}px) scale(${_mmView.scale})`;
}

function resetMermaidView() {
  _mmView.scale = 1; _mmView.x = 0; _mmView.y = 0;
  _applyMermaidTransform();
}

function _zoomMermaid(factor, cx, cy) {
  const next = Math.min(8, Math.max(0.2, _mmView.scale * factor));
  const ratio = next / _mmView.scale;
  // keep the point under (cx, cy) fixed while zooming
  _mmView.x = cx - (cx - _mmView.x) * ratio;
  _mmView.y = cy - (cy - _mmView.y) * ratio;
  _mmView.scale = next;
  _applyMermaidTransform();
}

(function initMermaidPanZoom() {
  const container = document.getElementById("mermaid-container");
  if (!container) return;

  container.addEventListener("wheel", (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    _zoomMermaid(e.deltaY < 0 ? 1.12 : 1 / 1.12,
                 e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });

  // Pan with a movement threshold so plain clicks still reach node links.
  let down = false, moved = false, startX = 0, startY = 0, lastX = 0, lastY = 0;
  const DRAG_THRESHOLD = 4;

  container.addEventListener("pointerdown", (e) => {
    if (e.target.closest("#mermaid-controls")) return;
    if (e.button !== 0) return;
    down = true; moved = false;
    startX = lastX = e.clientX; startY = lastY = e.clientY;
  });
  window.addEventListener("pointermove", (e) => {
    if (!down) return;
    if (!moved &&
        Math.hypot(e.clientX - startX, e.clientY - startY) > DRAG_THRESHOLD) {
      moved = true;
      container.classList.add("panning");
    }
    if (!moved) return;
    _mmView.x += e.clientX - lastX;
    _mmView.y += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    _applyMermaidTransform();
  });
  window.addEventListener("pointerup", () => {
    down = false;
    container.classList.remove("panning");
  });
  // Suppress the click that follows a drag so it doesn't open a repo link.
  container.addEventListener("click", (e) => {
    if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);

  document.getElementById("mermaid-controls").addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const rect = container.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    if (btn.dataset.zoom === "in")   _zoomMermaid(1.25, cx, cy);
    else if (btn.dataset.zoom === "out") _zoomMermaid(1 / 1.25, cx, cy);
    else if (btn.dataset.zoom === "fullscreen") {
      if (document.fullscreenElement) document.exitFullscreen();
      else container.requestFullscreen();
    }
    else resetMermaidView();
  });
})();

function renderStats(statsJson) {
  if (!statsJson) return;
  const stats = JSON.parse(statsJson);
  const grid = document.getElementById("stats-grid");
  grid.innerHTML = "";
  const addChip = (val, lbl) => {
    const chip = document.createElement("div");
    chip.className = "stat-chip";
    chip.innerHTML = `<div class="val">${val}</div><div class="lbl">${lbl}</div>`;
    grid.appendChild(chip);
  };
  addChip(stats.stages, "stages");
  addChip(stats.total, "total rules");
  for (const [sid, cnt] of Object.entries(stats.by_stage || {})) {
    addChip(cnt, sid);
  }
  document.getElementById("stats-section").style.display = "";
}

function renderCheck(ok, errMsg, statsJson, mermaidSrc, ioSummaryJson, mermaidLinks) {
  const badge = document.getElementById("check-badge");
  const icon  = document.getElementById("check-icon");
  const msg   = document.getElementById("check-msg");
  if (ok) {
    badge.className = "check-badge ok";
    icon.textContent  = "✓";
    msg.textContent   = "Validation passed";
  } else {
    badge.className = "check-badge error";
    icon.textContent  = "✗";
    msg.textContent   = (errMsg || "Validation failed").split("\n")[0];
  }
  if (ok && statsJson) renderStats(statsJson);
  if (ok && mermaidSrc) {
    document.getElementById("mermaid-section").style.display = "";
    try { _mermaidLinks = mermaidLinks ? JSON.parse(mermaidLinks) : {}; }
    catch { _mermaidLinks = {}; }
    renderMermaid(mermaidSrc);
  }
  if (ok && ioSummaryJson) renderIoSummary(ioSummaryJson);
}

function renderIoSummary(ioSummaryJson) {
  const rows = JSON.parse(ioSummaryJson);
  const tbody = document.querySelector("#io-table tbody");
  tbody.innerHTML = "";
  for (const row of rows) {
    const ins  = row.inputs.length  ? row.inputs.join(", ")  : '<span class="none">—</span>';
    const outs = row.outputs.length ? row.outputs.join(", ") : '<span class="none">—</span>';
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${row.stage}</td><td>${ins}</td><td>${outs}</td>`;
    tbody.appendChild(tr);
  }
  document.getElementById("io-section").style.display = "";
}

// ── Filter wizard ────────────────────────────────────────────────────────────
function updateWizardData(wizardJson, parentHash, parentUrl) {
  if (typeof wizardJson === "undefined") {
    console.warn("updateWizardData: worker did not send 'wizard' field — likely a stale worker.js cache. Hard-reload the page (Ctrl+Shift+R).");
  }
  if (!wizardJson) {
    wizardStages = [];
    wizardPicks = {};
    wizardParentHash = null;
    wizardParentUrl = null;
    wizardLastResult = null;
    wizardStep = 0;
    if (activeTab === "filter") renderWizard();
    return;
  }
  const stages = JSON.parse(wizardJson);
  // Reconcile picks: drop entries for stages/modules no longer present.
  // For Custom specs, also drop combo hashes that no longer exist.
  const newPicks = {};
  for (const st of stages) {
    const prev = wizardPicks[st.id];
    if (!prev) continue;
    const stagePicks = {};
    for (const m of st.modules) {
      if (!(m.id in prev)) continue;
      const spec = prev[m.id];
      if (Array.isArray(spec)) {
        const validHashes = new Set((m.params || []).map(p => p.hash));
        const kept = spec.filter(h => validHashes.has(h));
        if (kept.length) stagePicks[m.id] = kept;
        else if (m.params && m.params.length) stagePicks[m.id] = "all";
        else stagePicks[m.id] = "all";
      } else {
        stagePicks[m.id] = spec;
      }
    }
    if (Object.keys(stagePicks).length) newPicks[st.id] = stagePicks;
  }
  wizardStages = stages;
  wizardPicks = newPicks;
  wizardParentHash = parentHash || null;
  wizardParentUrl = parentUrl || null;
  // If user is on a now-out-of-range step, clamp.
  if (wizardStep > wizardStages.length) wizardStep = wizardStages.length;
  // Invalidate stale result if YAML changed.
  if (wizardLastResult && wizardLastResult.parent_hash !== parentHash) {
    wizardLastResult = null;
    if (wizardStep === wizardStages.length) wizardStep = Math.max(0, wizardStages.length - 1);
  }
  if (activeTab === "filter") renderWizard();
}

function renderWizard() {
  const stepperEl = document.getElementById("filter-stepper");
  const bodyEl    = document.getElementById("filter-body");
  const footerEl  = document.getElementById("filter-footer");
  const backBtn   = document.getElementById("filter-back");
  const nextBtn   = document.getElementById("filter-next");
  const statusEl  = document.getElementById("filter-status");

  if (!wizardStages.length) {
    stepperEl.innerHTML = "";
    bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No valid benchmark — fix YAML on the left to use Filter.</div>';
    footerEl.style.display = "none";
    return;
  }

  // Stepper pills
  stepperEl.innerHTML = "";
  wizardStages.forEach((st, i) => {
    const cnt = stagePickCount(st.id);
    const pill = document.createElement("span");
    pill.className = "step-pill" + (i === wizardStep ? " active" : (cnt > 0 ? " done" : ""));
    pill.innerHTML = `${i+1}. ${escapeHtml(st.id)}<span class="count">${cnt}/${st.modules.length}</span>`;
    stepperEl.appendChild(pill);
  });
  const resultPill = document.createElement("span");
  resultPill.className = "step-pill" + (wizardStep === wizardStages.length ? " active" : "");
  resultPill.textContent = `${wizardStages.length+1}. result`;
  stepperEl.appendChild(resultPill);

  if (wizardStep < wizardStages.length) {
    // Stage step
    renderStageStep(wizardStages[wizardStep], bodyEl);
    footerEl.style.display = "";
    backBtn.disabled = wizardStep === 0;
    const ok = stageStepIsValid(wizardStages[wizardStep]);
    nextBtn.disabled = !ok.valid;
    nextBtn.textContent = (wizardStep === wizardStages.length - 1) ? "Generate ✨" : "Next ›";
    statusEl.textContent = ok.valid ? "" : ok.reason;
  } else {
    // Result step
    const r = wizardLastResult;
    if (!r) {
      bodyEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No filter result yet. Go back and click Generate.</div>';
      footerEl.style.display = "";
      backBtn.disabled = false;
      nextBtn.style.display = "none";
      return;
    }
    const stagesKept = Object.keys(wizardPicks).length;
    const totalKept  = Object.values(wizardPicks).reduce((a, s) => a + Object.keys(s).length, 0);
    const totalCombos = totalCombosKept();
    const shortHash = (r.parent_hash || "").slice(0, 12);
    bodyEl.innerHTML = `
      <div class="result-section">
        <h3>Summary</h3>
        <div style="font-size:12px;color:var(--text-dim);">
          ${stagesKept} stage${stagesKept===1?"":"s"} · ${totalKept} module${totalKept===1?"":"s"} ·
          ${totalCombos} param combo${totalCombos===1?"":"s"} ·
          subset-of <code>sha256:${escapeHtml(shortHash)}…</code>
          ${r.parent_url ? '· canonical-url <code>' + escapeHtml(r.parent_url) + '</code>' : ''}
          ${loadedSourceUrl ? '· derived-from <code>' + escapeHtml(loadedSourceUrl) + '</code>' : ''}
        </div>
      </div>
      <div class="result-section">
        <h3>Filtered benchmark.yaml</h3>
        <pre id="filtered-yaml-out"></pre>
        <div class="result-actions">
          <button id="dl-yaml">Download benchmark.filtered.yaml</button>
          <button id="copy-yaml">Copy</button>
        </div>
      </div>
      <div class="result-section">
        <h3>Selection blob <span style="color:var(--text-dim);font-weight:normal;">(packed for CLI)</span></h3>
        <textarea id="blob-packed-out" readonly rows="3"></textarea>
        <div class="result-actions">
          <button id="copy-blob">Copy</button>
          <button id="dl-blob">Download .obfilter</button>
          <button id="toggle-json">Show JSON</button>
        </div>
        <pre id="blob-json-out" style="display:none;margin-top:6px;"></pre>
      </div>
    `;
    document.getElementById("filtered-yaml-out").textContent = r.filtered_yaml;
    document.getElementById("blob-packed-out").value = r.blob_packed;
    document.getElementById("blob-json-out").textContent = prettyJson(r.blob_json);
    document.getElementById("dl-yaml").onclick   = () => download("benchmark.filtered.yaml", r.filtered_yaml, "text/yaml");
    document.getElementById("copy-yaml").onclick = () => navigator.clipboard.writeText(r.filtered_yaml);
    document.getElementById("copy-blob").onclick = () => navigator.clipboard.writeText(r.blob_packed);
    document.getElementById("dl-blob").onclick   = () => download(`subset-${shortHash}.obfilter`, r.blob_packed, "application/octet-stream");
    document.getElementById("toggle-json").onclick = (e) => {
      const el = document.getElementById("blob-json-out");
      const showing = el.style.display !== "none";
      el.style.display = showing ? "none" : "";
      e.target.textContent = showing ? "Show JSON" : "Hide JSON";
    };
    footerEl.style.display = "";
    backBtn.disabled = false;
    nextBtn.style.display = "none";
    statusEl.textContent = "Generated.";
  }

  // Re-show next button if it was hidden in result view.
  if (wizardStep < wizardStages.length) nextBtn.style.display = "";
}

function runFilter() {
  if (!pyodideReady) return;
  const yaml = yamlEditor.getValue();
  // Picks are already in v2 shape: {stage_id: {mod_id: spec}}.
  document.getElementById("filter-status").textContent = "Generating…";
  worker.postMessage({ type: "filter", yaml, picks: wizardPicks, derivedFrom: loadedSourceUrl });
}

// ── Wizard helpers ───────────────────────────────────────────────────────────
function stagePickCount(sid) {
  const sp = wizardPicks[sid];
  return sp ? Object.keys(sp).length : 0;
}

function combosKeptForModule(stage, mid) {
  // Returns number of param combinations the spec retains for this module.
  const sp = wizardPicks[stage.id]; if (!sp) return 0;
  if (!(mid in sp)) return 0;
  const m = stage.modules.find(x => x.id === mid);
  const total = m && m.params ? m.params.length : 0;
  if (!total) return 1;                  // module without parameters → 1 implicit run
  const spec = sp[mid];
  if (spec === "all") return total;
  if (spec === "first") return 1;
  if (Array.isArray(spec)) return spec.length;
  return 0;
}

function totalCombosKept() {
  let n = 0;
  for (const st of wizardStages) {
    const sp = wizardPicks[st.id]; if (!sp) continue;
    for (const mid of Object.keys(sp)) n += combosKeptForModule(st, mid);
  }
  return n;
}

function stageStepIsValid(stage) {
  const sp = wizardPicks[stage.id];
  if (!sp || Object.keys(sp).length === 0) return { valid: false, reason: "Select ≥1 module to continue." };
  for (const mid of Object.keys(sp)) {
    const spec = sp[mid];
    if (Array.isArray(spec) && spec.length === 0) {
      return { valid: false, reason: `Pick ≥1 combo for ${mid} (or switch to All / First).` };
    }
  }
  return { valid: true };
}

function setSpec(sid, mid, spec) {
  if (!wizardPicks[sid]) wizardPicks[sid] = {};
  wizardPicks[sid][mid] = spec;
}
function unsetSpec(sid, mid) {
  if (!wizardPicks[sid]) return;
  delete wizardPicks[sid][mid];
  if (!Object.keys(wizardPicks[sid]).length) delete wizardPicks[sid];
}

// In-memory per-render UI state for "show all combos" expansion (transient).
const _expandAllCombos = new Set(); // keys: `${sid}:${mid}`

function renderStageStep(stage, bodyEl) {
  bodyEl.innerHTML = `
    <h2>Stage <code>${escapeHtml(stage.id)}</code></h2>
    <div class="stage-hint">
      Pick at least one module. For modules with parameters, choose
      <strong>All</strong>, <strong>First</strong> (single combo, debug),
      or <strong>Custom</strong>.
    </div>
    <div class="selectall">
      <a data-act="all">Select all</a>
      <a data-act="none">Select none</a>
      <span style="margin-left:auto;color:var(--text-dim);">${stagePickCount(stage.id)}/${stage.modules.length} modules</span>
    </div>
    <div id="filter-modules"></div>
  `;
  const modsEl = bodyEl.querySelector("#filter-modules");
  for (const m of stage.modules) modsEl.appendChild(buildModuleRow(stage, m));
  bodyEl.querySelectorAll('.selectall a').forEach(a => {
    a.addEventListener("click", () => {
      if (a.dataset.act === "all") {
        for (const m of stage.modules) {
          if (!wizardPicks[stage.id] || !(m.id in wizardPicks[stage.id])) {
            setSpec(stage.id, m.id, "all");
          }
        }
      } else {
        delete wizardPicks[stage.id];
      }
      renderWizard();
    });
  });
}

function buildModuleRow(stage, m) {
  const sp = wizardPicks[stage.id] || {};
  const isPicked = m.id in sp;
  const spec = sp[m.id];
  const params = m.params || [];
  const hasParams = params.length > 0;
  const tooMany   = params.length > COMBO_HARD_LIMIT;

  const row = document.createElement("div");
  row.className = "module-row";

  // Checkbox
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = isPicked;
  cb.addEventListener("change", () => {
    if (cb.checked) setSpec(stage.id, m.id, "all"); else unsetSpec(stage.id, m.id);
    renderWizard();
  });
  row.appendChild(cb);

  const mid = document.createElement("span");
  mid.className = "mid";
  mid.textContent = m.id;
  row.appendChild(mid);

  if (m.name && m.name !== m.id) {
    const mname = document.createElement("span");
    mname.className = "mname";
    mname.textContent = m.name;
    row.appendChild(mname);
  }

  const spacer = document.createElement("span");
  spacer.className = "row-spacer";
  row.appendChild(spacer);

  if (hasParams) {
    const sel = document.createElement("select");
    sel.className = "param-mode";
    sel.disabled = !isPicked;
    sel.title = "Parameter selection mode";
    const mode = (spec === "first") ? "first" : (Array.isArray(spec) ? "pick" : "all");
    for (const [v, label] of [
      ["all",   `All (${params.length} combo${params.length===1?"":"s"})`],
      ["first", "First (debug)"],
      ["pick",  tooMany ? `Custom… (disabled, >${COMBO_HARD_LIMIT})` : "Custom…"],
    ]) {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = label;
      if (v === "pick" && tooMany) opt.disabled = true;
      if (v === mode) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.addEventListener("change", () => {
      if (sel.value === "all") setSpec(stage.id, m.id, "all");
      else if (sel.value === "first") setSpec(stage.id, m.id, "first");
      else setSpec(stage.id, m.id, Array.isArray(spec) ? spec : []);
      renderWizard();
    });
    row.appendChild(sel);

    const pcount = document.createElement("span");
    const kept = combosKeptForModule(stage, m.id);
    pcount.className = "pcount" + (isPicked && Array.isArray(spec) && spec.length === 0 ? " warn" : "");
    pcount.textContent = isPicked
      ? `${kept}/${params.length} kept`
      : `${params.length} combos`;
    row.appendChild(pcount);
  }

  const wrapper = document.createDocumentFragment();
  wrapper.appendChild(row);

  if (isPicked && Array.isArray(spec) && hasParams && !tooMany) {
    wrapper.appendChild(buildComboList(stage, m, spec));
  }
  // Wrap into a single element since DocumentFragment doesn't render with margins consistently.
  const div = document.createElement("div");
  div.appendChild(wrapper);
  return div;
}

function buildComboList(stage, m, spec) {
  const params = m.params || [];
  const wrap = document.createElement("div");
  wrap.className = "combo-list";

  const expandKey = `${stage.id}:${m.id}`;
  const expanded = _expandAllCombos.has(expandKey);
  const showLimit = expanded ? params.length : Math.min(COMBO_INLINE_LIMIT, params.length);

  const head = document.createElement("div");
  head.className = "combo-list-head";
  const sel = new Set(spec);
  head.innerHTML = `
    <a data-act="all">All</a>
    <a data-act="none">None</a>
    <span>${sel.size}/${params.length} picked</span>
  `;
  head.querySelector('[data-act=all]').addEventListener("click", () => {
    setSpec(stage.id, m.id, params.map(p => p.hash));
    renderWizard();
  });
  head.querySelector('[data-act=none]').addEventListener("click", () => {
    setSpec(stage.id, m.id, []);
    renderWizard();
  });
  wrap.appendChild(head);

  for (let i = 0; i < showLimit; i++) {
    const p = params[i];
    const row = document.createElement("label");
    row.className = "combo-row";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = sel.has(p.hash);
    cb.addEventListener("change", () => {
      const cur = new Set(Array.isArray(wizardPicks[stage.id]?.[m.id]) ? wizardPicks[stage.id][m.id] : []);
      if (cb.checked) cur.add(p.hash); else cur.delete(p.hash);
      setSpec(stage.id, m.id, [...cur]);
      renderWizard();
    });
    row.appendChild(cb);
    const cli = document.createElement("span");
    cli.className = "ccli";
    cli.textContent = p.cli || JSON.stringify(p.items);
    row.appendChild(cli);
    const hash = document.createElement("span");
    hash.className = "chash";
    hash.textContent = "#" + p.hash;
    row.appendChild(hash);
    wrap.appendChild(row);
  }

  if (params.length > COMBO_INLINE_LIMIT) {
    const more = document.createElement("div");
    if (expanded) {
      more.className = "combo-list-more";
      more.textContent = `Show fewer (collapse to ${COMBO_INLINE_LIMIT})`;
      more.addEventListener("click", () => {
        _expandAllCombos.delete(expandKey);
        renderWizard();
      });
    } else {
      more.className = "combo-list-more";
      more.textContent = `Show all ${params.length} combos (${params.length - COMBO_INLINE_LIMIT} more)`;
      more.addEventListener("click", () => {
        _expandAllCombos.add(expandKey);
        renderWizard();
      });
    }
    wrap.appendChild(more);
  }

  return wrap;
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

function prettyJson(s) {
  try { return JSON.stringify(JSON.parse(s), null, 2); } catch (_) { return s; }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ── Divider drag ─────────────────────────────────────────────────────────────
(function setupDivider() {
  const divider = document.getElementById("divider");
  const editors = document.getElementById("editors");
  const leftPane = document.getElementById("yaml-pane");
  const rightPane = document.getElementById("snake-pane");
  let dragging = false;
  let startX, leftW, totalW;

  divider.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX;
    leftW = leftPane.getBoundingClientRect().width;
    totalW = editors.getBoundingClientRect().width - divider.offsetWidth;
    divider.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const newLeft = Math.max(200, Math.min(totalW - 200, leftW + dx));
    const pct = (newLeft / totalW) * 100;
    leftPane.style.flex = "none";
    leftPane.style.width = pct + "%";
    rightPane.style.flex = "1";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    // trigger Monaco layout
    if (yamlEditor)  yamlEditor.layout();
    if (rightEditor) rightEditor.layout();
  });
})();
</script>
</body>
</html>
